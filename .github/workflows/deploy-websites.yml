name: Deploy Client Websites

on:
  push:
    branches: [main]
    paths:
      - 'projects/marceau-solutions/website/**'
      - 'projects/swflorida-hvac/website/**'
      - 'projects/boabfit/website/**'
      - 'projects/flames-of-passion/website/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      marceau: ${{ steps.changes.outputs.marceau }}
      hvac: ${{ steps.changes.outputs.hvac }}
      boabfit: ${{ steps.changes.outputs.boabfit }}
      flames: ${{ steps.changes.outputs.flames }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: changes
        run: |
          echo "marceau=$(git diff --name-only HEAD~1 HEAD | grep -q 'projects/marceau-solutions/website/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "hvac=$(git diff --name-only HEAD~1 HEAD | grep -q 'projects/swflorida-hvac/website/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "boabfit=$(git diff --name-only HEAD~1 HEAD | grep -q 'projects/boabfit/website/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "flames=$(git diff --name-only HEAD~1 HEAD | grep -q 'projects/flames-of-passion/website/' && echo true || echo false)" >> $GITHUB_OUTPUT

  deploy-marceau:
    needs: detect-changes
    if: needs.detect-changes.outputs.marceau == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to marceausolutions.com
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: MarceauSolutions/marceausolutions.com
          publish_dir: ./projects/marceau-solutions/website
          publish_branch: main

  deploy-hvac:
    needs: detect-changes
    if: needs.detect-changes.outputs.hvac == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to swflorida-comfort-hvac
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ./projects/swflorida-hvac/website
          external_repository: MarceauSolutions/swflorida-comfort-hvac
          publish_branch: main

  deploy-boabfit:
    needs: detect-changes
    if: needs.detect-changes.outputs.boabfit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to boabfit-website
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ./projects/boabfit/website
          external_repository: MarceauSolutions/boabfit-website
          publish_branch: main

  deploy-flames:
    needs: detect-changes
    if: needs.detect-changes.outputs.flames == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to flames-of-passion-website
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ./projects/flames-of-passion/website
          external_repository: MarceauSolutions/flames-of-passion-website
          publish_branch: main
