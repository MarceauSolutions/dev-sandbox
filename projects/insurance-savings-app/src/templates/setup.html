{% extends "base.html" %}
{% block title %}Profile Setup — AutoInsure Saver{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">🔧 Profile Setup</h2>
    
    <!-- Step 1: Basic Info -->
    <form action="/api/profile/" method="POST" class="space-y-8" id="profileForm">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Step 1: Your Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" name="name" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
        </div>

        <!-- Step 2: Vehicle -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Step 2: Your Vehicle</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Year</label>
                    <input type="number" name="vehicle_year" min="1980" max="2027" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Make</label>
                    <input type="text" name="vehicle_make" placeholder="e.g., Toyota" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Model</label>
                    <input type="text" name="vehicle_model" placeholder="e.g., Camry" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">VIN (optional)</label>
                    <input type="text" name="vehicle_vin" maxlength="17"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Annual Mileage</label>
                    <input type="number" name="vehicle_mileage" placeholder="12,000"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Estimated Value</label>
                    <input type="number" name="vehicle_value" placeholder="25000"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
            </div>
        </div>

        <!-- Step 3: Current Policy -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Step 3: Current Insurance</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Insurance Carrier</label>
                    <select name="carrier" required class="w-full border border-gray-300 rounded-lg px-3 py-2">
                        <option value="">Select carrier...</option>
                        <option>GEICO</option>
                        <option>Progressive</option>
                        <option>State Farm</option>
                        <option>Allstate</option>
                        <option>USAA</option>
                        <option>Liberty Mutual</option>
                        <option>Farmers</option>
                        <option>Nationwide</option>
                        <option>Travelers</option>
                        <option>American Family</option>
                        <option>Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Premium</label>
                    <input type="number" step="0.01" name="monthly_premium" required placeholder="150.00"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Deductible</label>
                    <select name="deductible" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                        <option value="250">$250</option>
                        <option value="500" selected>$500</option>
                        <option value="1000">$1,000</option>
                        <option value="1500">$1,500</option>
                        <option value="2000">$2,000</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Renewal Date</label>
                    <input type="date" name="renewal_date"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Payment Frequency</label>
                    <select name="payment_frequency" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                        <option value="monthly">Monthly</option>
                        <option value="semi_annual">Semi-Annual</option>
                        <option value="annual">Annual</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Step 4: Driving Record -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Step 4: Driving Profile</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
                    <input type="number" name="age" min="16" max="100"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Years Licensed</label>
                    <input type="number" name="years_licensed" min="0"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Credit Score Range</label>
                    <select name="credit_score_range" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                        <option value="">Select...</option>
                        <option value="excellent">Excellent (800+)</option>
                        <option value="very_good">Very Good (740-799)</option>
                        <option value="good">Good (670-739)</option>
                        <option value="fair">Fair (580-669)</option>
                        <option value="poor">Poor (Below 580)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Accidents (last 3 years)</label>
                    <input type="number" name="accidents_3yr" min="0" value="0"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tickets (last 3 years)</label>
                    <input type="number" name="tickets_3yr" min="0" value="0"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2">
                </div>
            </div>
            <div class="mt-4">
                <p class="text-sm font-medium text-gray-700 mb-2">Applicable Discounts</p>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" name="homeowner" class="rounded border-gray-300 text-blue-600">
                        Homeowner
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" name="married" class="rounded border-gray-300 text-blue-600">
                        Married
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" name="military" class="rounded border-gray-300 text-blue-600">
                        Military/Veteran
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" name="defensive_driving" class="rounded border-gray-300 text-blue-600">
                        Defensive Driving Course
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                        <input type="checkbox" name="good_student" class="rounded border-gray-300 text-blue-600">
                        Good Student
                    </label>
                </div>
            </div>
        </div>

        <button type="submit"
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium text-lg hover:bg-blue-700 transition">
            Save Profile & Start Monitoring 🚀
        </button>
    </form>
</div>

<script>
document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    
    try {
        // 1. Create profile
        const profileRes = await fetch('/api/profile/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: formData.get('name'),
                email: formData.get('email'),
            })
        });
        const profile = await profileRes.json();
        const userId = profile.id;
        
        // 2. Add vehicle
        await fetch(`/api/profile/${userId}/vehicle`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                year: parseInt(formData.get('vehicle_year')),
                make: formData.get('vehicle_make'),
                model: formData.get('vehicle_model'),
                vin: formData.get('vehicle_vin') || null,
                annual_mileage: parseInt(formData.get('vehicle_mileage')) || null,
                estimated_value: parseFloat(formData.get('vehicle_value')) || null,
            })
        });
        
        // 3. Add policy
        const monthly = parseFloat(formData.get('monthly_premium'));
        await fetch(`/api/profile/${userId}/policy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                carrier: formData.get('carrier'),
                monthly_premium: monthly,
                annual_premium: monthly * 12,
                deductible: parseFloat(formData.get('deductible')),
                renewal_date: formData.get('renewal_date') || null,
                payment_frequency: formData.get('payment_frequency'),
            })
        });
        
        // 4. Add driving record
        await fetch(`/api/profile/${userId}/driving-record`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                age: parseInt(formData.get('age')) || null,
                years_licensed: parseInt(formData.get('years_licensed')) || null,
                accidents_3yr: parseInt(formData.get('accidents_3yr')) || 0,
                tickets_3yr: parseInt(formData.get('tickets_3yr')) || 0,
                credit_score_range: formData.get('credit_score_range') || null,
                homeowner: formData.get('homeowner') === 'on',
                married: formData.get('married') === 'on',
                military: formData.get('military') === 'on',
                defensive_driving_course: formData.get('defensive_driving') === 'on',
                good_student: formData.get('good_student') === 'on',
            })
        });
        
        // Redirect to dashboard
        window.location.href = '/';
    } catch (err) {
        alert('Error saving profile: ' + err.message);
    }
});
</script>
{% endblock %}
