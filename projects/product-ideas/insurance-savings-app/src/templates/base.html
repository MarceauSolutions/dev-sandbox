<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AutoInsure Saver{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .savings-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .card { @apply bg-white rounded-xl shadow-sm border border-gray-200 p-6; }
    </style>
</head>
<body class="h-full">
    <div class="min-h-full">
        <!-- Navigation -->
        <nav class="bg-white shadow-sm border-b border-gray-200">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <div class="flex items-center">
                        <span class="text-2xl mr-2">🛡️</span>
                        <span class="text-xl font-bold text-gray-900">AutoInsure Saver</span>
                    </div>
                    <div class="flex space-x-4">
                        <a href="/" class="text-gray-700 hover:text-blue-600 px-3 py-2 text-sm font-medium">Dashboard</a>
                        <a href="/deals" class="text-gray-700 hover:text-blue-600 px-3 py-2 text-sm font-medium">Deals</a>
                        <a href="/setup" class="text-gray-700 hover:text-blue-600 px-3 py-2 text-sm font-medium">Profile</a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Content -->
        <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
