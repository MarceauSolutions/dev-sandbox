<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW Florida Comfort HVAC - Contact Form Example</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        h1 {
            color: #1a365d;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-label input {
            width: auto;
        }

        .submit-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .phone-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .phone-link a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }

        .emergency-badge {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .emergency-badge span {
            color: #dc2626;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>🌡️ Get a Free Quote</h1>
            <p class="subtitle">We'll respond within 2 hours during business hours</p>

            <div class="emergency-badge">
                <span>🚨 Emergency?</span> Call us now: <a href="tel:+12397666129">(239) 766-6129</a>
            </div>

            <form id="hvac-contact-form" data-form-handler data-business="swfloridacomfort">
                <div class="form-group">
                    <label for="name">Your Name *</label>
                    <input type="text" id="name" name="name" required placeholder="John Smith">
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="(239) 555-1234">
                </div>

                <div class="form-group">
                    <label for="interest">Service Needed *</label>
                    <select id="interest" name="interest" required>
                        <option value="">Select a service...</option>
                        <option value="AC Repair">AC Repair</option>
                        <option value="AC Installation">New AC Installation</option>
                        <option value="AC Maintenance">Maintenance / Tune-up</option>
                        <option value="Heating Repair">Heating Repair</option>
                        <option value="Duct Cleaning">Duct Cleaning</option>
                        <option value="Indoor Air Quality">Indoor Air Quality</option>
                        <option value="Emergency Service">Emergency Service</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Tell us more about your issue</label>
                    <textarea id="message" name="message" placeholder="Describe your HVAC problem or question..."></textarea>
                </div>

                <div class="form-group">
                    <label>Stay in touch:</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="email_opt_in" checked>
                            <span>Email me updates</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="sms_opt_in">
                            <span>Text me updates</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Get Free Quote</button>
            </form>

            <p class="phone-link">
                Or call us directly: <a href="tel:+12397666129">(239) 766-6129</a>
            </p>
        </div>
    </div>

    <!-- Form Handler Script -->
    <script src="form-handler.js"></script>
</body>
</html>
