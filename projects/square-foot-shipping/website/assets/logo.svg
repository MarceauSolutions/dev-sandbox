<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#blueGradient)"/>

  <!-- Inner circle -->
  <circle cx="200" cy="200" r="165" fill="white"/>

  <!-- Warehouse/Box icon -->
  <g transform="translate(200, 160)">
    <!-- Main box - 3D effect -->
    <path d="M-70 -30 L0 -60 L70 -30 L70 40 L0 70 L-70 40 Z" fill="#e2e8f0" stroke="#1e40af" stroke-width="3"/>
    <!-- Top face -->
    <path d="M-70 -30 L0 -60 L70 -30 L0 0 Z" fill="#f1f5f9" stroke="#1e40af" stroke-width="3"/>
    <!-- Right face -->
    <path d="M0 0 L70 -30 L70 40 L0 70 Z" fill="#cbd5e1" stroke="#1e40af" stroke-width="3"/>
    <!-- Left face -->
    <path d="M-70 -30 L0 0 L0 70 L-70 40 Z" fill="#e2e8f0" stroke="#1e40af" stroke-width="3"/>

    <!-- Grid lines on box (square foot reference) -->
    <line x1="-35" y1="-15" x2="-35" y2="55" stroke="#1e40af" stroke-width="1.5" opacity="0.5"/>
    <line x1="-70" y1="5" x2="0" y2="35" stroke="#1e40af" stroke-width="1.5" opacity="0.5"/>

    <!-- Arrow indicating shipping/movement -->
    <g transform="translate(40, 50)">
      <path d="M0 0 L30 0 L30 -8 L45 5 L30 18 L30 10 L0 10 Z" fill="url(#orangeAccent)"/>
    </g>
  </g>

  <!-- Storage building silhouette -->
  <g transform="translate(200, 270)">
    <rect x="-80" y="0" width="160" height="50" fill="#1e40af" rx="3"/>
    <!-- Loading dock doors -->
    <rect x="-70" y="10" width="35" height="40" fill="#f97316" rx="2"/>
    <rect x="-25" y="10" width="35" height="40" fill="#3b82f6" rx="2"/>
    <rect x="20" y="10" width="35" height="40" fill="#f97316" rx="2"/>
    <!-- Door lines -->
    <line x1="-52" y1="10" x2="-52" y2="50" stroke="#ea580c" stroke-width="2"/>
    <line x1="-7" y1="10" x2="-7" y2="50" stroke="#1e40af" stroke-width="2"/>
    <line x1="38" y1="10" x2="38" y2="50" stroke="#ea580c" stroke-width="2"/>
  </g>

  <!-- Text: SQUARE FOOT -->
  <text x="200" y="355" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1e40af" text-anchor="middle">SQUARE FOOT</text>

  <!-- Text: SHIPPING & STORAGE -->
  <text x="200" y="378" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle">SHIPPING &amp; STORAGE</text>
</svg>
