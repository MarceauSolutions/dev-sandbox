<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marceau Solutions — Client Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/client/css/client.css">
  <style>
    /* Inline critical: prevent FOUC */
    body { background: #060b18; color: #f0f4f8; }
  </style>
</head>
<body>

<div class="app-shell" id="app-shell">

  <!-- Noise texture overlay -->
  <div class="noise-overlay"></div>

  <!-- Sidebar (simple, 6 items, no collapsible groups) -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&#127769;</div>
      <span class="logo-text">Marceau Solutions</span>
    </div>

    <div class="sidebar-nav">
      <div class="nav-item active" data-page="" onclick="Router.go('')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span class="nav-label">Dashboard</span>
      </div>
      <div class="nav-item" data-page="workouts" onclick="Router.go('workouts')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5l11 11M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10z"/><path d="M8 12a4 4 0 108 0 4 4 0 00-8 0"/></svg>
        <span class="nav-label">My Workouts</span>
      </div>
      <div class="nav-item" data-page="form-check" onclick="Router.go('form-check')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        <span class="nav-label">Form Check</span>
      </div>
      <div class="nav-item" data-page="ask-coach" onclick="Router.go('ask-coach')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3c-4.97 0-9 3.13-9 7s4.03 7 9 7c.7 0 1.38-.07 2.04-.2L19 19l-1.22-3.04C19.18 14.56 21 12.9 21 10c0-3.87-4.03-7-9-7z"/></svg>
        <span class="nav-label">Ask Coach</span>
      </div>
      <div class="nav-item" data-page="progress" onclick="Router.go('progress')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        <span class="nav-label">My Progress</span>
      </div>
      <div class="nav-item" data-page="profile" onclick="Router.go('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label">My Profile</span>
      </div>
    </div>

    <div class="sidebar-footer">
      Embrace the Pain
    </div>
  </nav>

  <!-- Sidebar overlay (mobile only — hidden by default) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="App.toggleSidebar()"></div>

  <!-- Topbar -->
  <header class="topbar">
    <button class="topbar-toggle" onclick="App.toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="topbar-breadcrumb">
      Marceau Solutions &rsaquo; <span id="breadcrumb-page">Dashboard</span>
    </div>
    <div class="topbar-spacer"></div>
    <span class="topbar-badge" id="client-level">Lv 1</span>
    <span class="topbar-streak">
      <span class="streak-icon">&#128293;</span>
      <span id="client-streak">0 day streak</span>
    </span>
    <span id="client-name" style="font-size:13px;font-weight:600;color:var(--text-secondary)"></span>
    <button class="topbar-logout" onclick="App.logout()">Logout</button>
  </header>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <div class="loading-overlay"><div class="spinner"></div> Loading...</div>
  </main>

</div>

<!-- Scripts -->
<script src="/client/js/api.js"></script>
<script src="/client/js/toast.js"></script>
<script src="/client/js/router.js"></script>
<script src="/client/js/pages/login.js"></script>
<script src="/client/js/pages/dashboard.js"></script>
<script src="/client/js/pages/workouts.js"></script>
<script src="/client/js/pages/form-check.js"></script>
<script src="/client/js/pages/ask-coach.js"></script>
<script src="/client/js/pages/progress.js"></script>
<script src="/client/js/pages/profile.js"></script>
<script src="/client/js/app.js"></script>

</body>
</html>
