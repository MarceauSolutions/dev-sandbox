<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miko's Lab — AI Influencer Workshop</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C9963C;
  --gold-light: #e8c777;
  --gold-dim: rgba(201,150,60,0.15);
  --bg: #1a1a1e;
  --bg-card: #242428;
  --bg-sidebar: #1e1e22;
  --bg-hover: #2e2e34;
  --text: #e8e8ec;
  --text-dim: #9898a4;
  --text-bright: #ffffff;
  --border: #333338;
  --success: #4ade80;
  --warning: #fbbf24;
  --danger: #f87171;
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-w: 260px;
}
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}
a { color: var(--gold); text-decoration: none; }
a:hover { color: var(--gold-light); }
button { cursor: pointer; font-family: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.sidebar-header {
  padding: 20px 18px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 1.15rem;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 0.5px;
}
.sidebar-header .subtitle {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 4px;
}
.nav-section {
  padding: 14px 0 6px;
}
.nav-section-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  padding: 0 18px;
  margin-bottom: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  color: var(--text-dim);
  font-size: 0.88rem;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active {
  background: var(--gold-dim);
  color: var(--gold);
  border-left-color: var(--gold);
}
.nav-icon { width: 18px; text-align: center; font-size: 0.95rem; }
.sidebar-footer {
  margin-top: auto;
  padding: 14px 18px;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-dim);
}
.sync-status {
  display: flex;
  align-items: center;
  gap: 6px;
}
.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--success);
}
.sync-dot.stale { background: var(--warning); }

/* ===== MAIN CONTENT ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-sidebar);
  min-height: 52px;
}
.topbar h2 { font-size: 1.05rem; color: var(--text-bright); }
.topbar-actions { display: flex; gap: 8px; }
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.82rem;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-gold {
  background: var(--gold);
  color: #1a1a1e;
  border-color: var(--gold);
  font-weight: 600;
}
.btn-gold:hover { background: var(--gold-light); }
.btn-sm { padding: 5px 10px; font-size: 0.78rem; }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.card-title { font-size: 1rem; font-weight: 600; color: var(--text-bright); }
.card-subtitle { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

/* ===== GRID ===== */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 1200px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }

/* ===== STAT CARDS ===== */
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  text-align: center;
}
.stat-value { font-size: 2rem; font-weight: 700; color: var(--gold); }
.stat-label { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }

/* ===== KNOWLEDGE LIBRARY ===== */
.category-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color 0.2s;
}
.category-card:hover { border-color: var(--gold); }
.category-header {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.category-header .cat-icon {
  width: 36px; height: 36px;
  background: var(--gold-dim);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}
.category-header h3 { font-size: 0.95rem; color: var(--text-bright); }
.category-header .count {
  margin-left: auto;
  background: var(--gold-dim);
  color: var(--gold);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.72rem;
  font-weight: 600;
}
.category-guides { padding: 8px 0; }
.guide-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}
.guide-item:hover { background: var(--bg-hover); border-left-color: var(--gold); }
.guide-item .guide-title { font-size: 0.85rem; color: var(--text); }

/* ===== GUIDE READER ===== */
.reader-panel {
  display: none;
  flex-direction: column;
  height: 100%;
}
.reader-panel.active { display: flex; }
.reader-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.reader-back {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  padding: 6px 10px;
  font-size: 0.82rem;
}
.reader-back:hover { border-color: var(--gold); color: var(--gold); }
.reader-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  line-height: 1.7;
  font-size: 0.92rem;
}
.reader-body h1, .reader-body h2, .reader-body h3 { color: var(--gold); margin: 20px 0 10px; }
.reader-body h1 { font-size: 1.4rem; }
.reader-body h2 { font-size: 1.15rem; }
.reader-body h3 { font-size: 1rem; }
.reader-body p { margin-bottom: 12px; }
.reader-body ul, .reader-body ol { margin: 8px 0 12px 24px; }
.reader-body li { margin-bottom: 4px; }
.reader-body code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }
.reader-body pre {
  background: var(--bg);
  padding: 14px;
  border-radius: var(--radius);
  overflow-x: auto;
  margin: 12px 0;
}
.reader-body blockquote {
  border-left: 3px solid var(--gold);
  padding-left: 14px;
  color: var(--text-dim);
  margin: 12px 0;
}
.reader-body table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.reader-body th, .reader-body td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
  font-size: 0.85rem;
}
.reader-body th { background: var(--bg); color: var(--gold); }

/* ===== TELEGRAM FEED ===== */
.post-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 12px;
}
.post-date {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.post-text {
  font-size: 0.88rem;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
}
.post-links {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.post-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: var(--gold-dim);
  border-radius: 4px;
  font-size: 0.75rem;
  color: var(--gold);
}
.post-photos {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.post-photos img {
  max-width: 200px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

/* ===== WORKSHOP ===== */
.workshop-steps {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.workshop-step {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.8rem;
  color: var(--text-dim);
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
}
.workshop-step:hover { border-color: var(--gold); color: var(--text); }
.workshop-step.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
.workshop-step.completed { color: var(--success); border-color: var(--success); }
.step-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
}
.workshop-step.active .step-num { background: var(--gold); color: #1a1a1e; }
.workshop-step.completed .step-num { background: var(--success); color: #1a1a1e; }
.step-content { display: none; }
.step-content.active { display: block; }

/* ===== TOOL CARDS ===== */
.tool-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  transition: border-color 0.2s;
}
.tool-card:hover { border-color: var(--gold); }
.tool-name { font-size: 0.9rem; font-weight: 600; color: var(--text-bright); }
.tool-desc { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }
.tool-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 10px;
}
.tool-status.available { background: rgba(74,222,128,0.15); color: var(--success); }
.tool-status.unavailable { background: rgba(248,113,113,0.15); color: var(--danger); }

/* ===== FORMS ===== */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 0.82rem; color: var(--text-dim); margin-bottom: 6px; }
.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.88rem;
  font-family: inherit;
}
.form-input:focus, .form-textarea:focus, .form-select:focus {
  outline: none;
  border-color: var(--gold);
}
.form-textarea { min-height: 100px; resize: vertical; }

/* ===== CHECKLIST ===== */
.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: var(--radius);
  margin-bottom: 8px;
}
.checklist-item input[type="checkbox"] { margin-top: 3px; accent-color: var(--gold); }
.checklist-item label { font-size: 0.88rem; line-height: 1.5; cursor: pointer; }
.checklist-item .tip { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

/* ===== PROMPT BUILDER ===== */
.prompt-output {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--gold-light);
  min-height: 80px;
  white-space: pre-wrap;
  position: relative;
}
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  padding: 4px 8px;
  font-size: 0.72rem;
  cursor: pointer;
}
.copy-btn:hover { color: var(--gold); border-color: var(--gold); }

/* ===== TABS ===== */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab {
  padding: 8px 16px;
  font-size: 0.85rem;
  color: var(--text-dim);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ===== LOADING ===== */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== SEARCH ===== */
.search-box {
  position: relative;
  margin-bottom: 16px;
}
.search-box input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.88rem;
}
.search-box input:focus { outline: none; border-color: var(--gold); }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 0.85rem;
}

/* ===== HIDDEN ===== */
.hidden { display: none !important; }

/* ===== BADGE ===== */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
}
.badge-gold { background: var(--gold-dim); color: var(--gold); }
.badge-green { background: rgba(74,222,128,0.15); color: var(--success); }
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<nav class="sidebar">
  <div class="sidebar-header">
    <h1>MIKO'S LAB</h1>
    <div class="subtitle">AI Influencer Workshop</div>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Navigate</div>
    <a class="nav-item active" data-page="dashboard" href="#">
      <span class="nav-icon">&#9632;</span> Dashboard
    </a>
    <a class="nav-item" data-page="knowledge" href="#">
      <span class="nav-icon">&#9733;</span> Knowledge Library
    </a>
    <a class="nav-item" data-page="methods" href="#">
      <span class="nav-icon">&#9881;</span> Methods Summary
    </a>
    <a class="nav-item" data-page="feed" href="#">
      <span class="nav-icon">&#9993;</span> Telegram Feed
    </a>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Create</div>
    <a class="nav-item" data-page="workshop" href="#">
      <span class="nav-icon">&#10024;</span> AI Influencer Workshop
    </a>
    <a class="nav-item" data-page="tools" href="#">
      <span class="nav-icon">&#9874;</span> Your Tools
    </a>
    <a class="nav-item" data-page="prompts" href="#">
      <span class="nav-icon">&#10002;</span> Prompt Builder
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="sync-status">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">Loading...</span>
    </div>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="topbar">
    <h2 id="pageTitle">Dashboard</h2>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>
  <div class="content-area" id="contentArea">
    <!-- Pages rendered by JS -->
  </div>
</div>

<script>
// ===== STATE =====
const state = {
  page: 'dashboard',
  overview: null,
  knowledge: null,
  methods: null,
  posts: null,
  tools: null,
  workshopStep: 0,
  readerGuide: null,
  searchQuery: '',
  workshopData: {
    niche: '', persona: '', character_desc: '', platform: 'instagram',
    content_type: 'ugc', voice_style: '', posting_schedule: '',
  },
};

// ===== API =====
async function api(path, opts = {}) {
  const resp = await fetch(`/api${path}`, {
    headers: {'Content-Type': 'application/json'},
    ...opts,
  });
  return resp.json();
}

// ===== NAV =====
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', e => {
    e.preventDefault();
    const page = item.dataset.page;
    navigate(page);
  });
});

function navigate(page) {
  state.page = page;
  state.readerGuide = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
  renderPage();
}

// ===== MARKDOWN RENDERER (basic) =====
function md(text) {
  if (!text) return '';
  let html = text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');

  // Tables
  html = html.replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)+)/g, (match, header, rows) => {
    const ths = header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  return `<p>${html}</p>`;
}

// ===== RENDER PAGES =====
function renderPage() {
  const area = document.getElementById('contentArea');
  const title = document.getElementById('pageTitle');
  const actions = document.getElementById('topbarActions');
  actions.innerHTML = '';

  switch (state.page) {
    case 'dashboard': renderDashboard(area, title, actions); break;
    case 'knowledge': renderKnowledge(area, title, actions); break;
    case 'methods': renderMethods(area, title, actions); break;
    case 'feed': renderFeed(area, title, actions); break;
    case 'workshop': renderWorkshop(area, title, actions); break;
    case 'tools': renderTools(area, title, actions); break;
    case 'prompts': renderPrompts(area, title, actions); break;
  }
}

// ===== DASHBOARD =====
async function renderDashboard(area, title, actions) {
  title.textContent = 'Dashboard';
  area.innerHTML = '<div class="spinner"></div>';

  if (!state.overview) state.overview = await api('/overview');
  const d = state.overview;

  area.innerHTML = `
    <div class="grid grid-4" style="margin-bottom:24px;">
      <div class="stat-card"><div class="stat-value">${d.total_guides}</div><div class="stat-label">Knowledge Guides</div></div>
      <div class="stat-card"><div class="stat-value">${d.total_pdfs}</div><div class="stat-label">PDF Resources</div></div>
      <div class="stat-card"><div class="stat-value">${d.total_posts}</div><div class="stat-label">Telegram Posts</div></div>
      <div class="stat-card"><div class="stat-value">${d.categories}</div><div class="stat-label">Topic Categories</div></div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Quick Start</div><div class="card-subtitle">Start creating AI influencers</div></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <a href="#" onclick="navigate('workshop');return false" class="btn btn-gold" style="justify-content:center;">Launch AI Influencer Workshop</a>
          <a href="#" onclick="navigate('knowledge');return false" class="btn" style="justify-content:center;">Browse Knowledge Library</a>

// ===== KNOWLEDGE LIBRARY =====
async function renderKnowledge(area, title, actions) {
  title.textContent = 'Knowledge Library';
  actions.innerHTML = '<button class="btn btn-sm" onclick="navigate(\'methods\')">Methods Summary</button>';

  if (state.readerGuide) {
    renderGuideReader(area);
    return;
  }

  area.innerHTML = '<div class="spinner"></div>';
  if (!state.knowledge) state.knowledge = await api('/knowledge');

  const cats = state.knowledge;

  let searchHtml = `<div class="search-box"><span class="search-icon">&#128269;</span><input type="text" placeholder="Search guides..." id="guideSearch" value="${state.searchQuery}" oninput="filterGuides(this.value)"></div>`;

  let html = searchHtml;
  for (const [key, cat] of Object.entries(cats)) {
    if (!cat.guides || cat.guides.length === 0) continue;
    const iconMap = {rocket:'&#128640;',user:'&#128100;',video:'&#127909;',microphone:'&#127908;','dollar-sign':'&#128176;',settings:'&#9881;',zap:'&#9889;'};
    html += `
      <div class="category-card" data-category="${key}">
        <div class="category-header" onclick="toggleCategory('${key}')">
          <div class="cat-icon">${iconMap[cat.icon]||'&#9733;'}</div>
          <div>
            <h3>${cat.name}</h3>
            <div style="font-size:0.75rem;color:var(--text-dim);">${cat.description}</div>
          </div>
          <span class="count">${cat.guides.length}</span>
        </div>
        <div class="category-guides" id="cat-${key}" style="display:none;">
          ${cat.guides.map((g, i) => `
            <div class="guide-item" onclick="openGuide('${key}', ${i})">
              <span style="color:var(--text-dim);font-size:0.8rem;">&#9654;</span>
              <span class="guide-title">${g.title}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  area.innerHTML = html;
}

function toggleCategory(key) {
  const el = document.getElementById(`cat-${key}`);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function openGuide(catKey, idx) {
  state.readerGuide = { catKey, idx };
  renderPage();
}

function renderGuideReader(area) {
  const { catKey, idx } = state.readerGuide;
  const guide = state.knowledge[catKey].guides[idx];

  area.innerHTML = `
    <div class="reader-panel active">
      <div class="reader-header">
        <button class="reader-back" onclick="state.readerGuide=null;renderPage();">&#8592; Back</button>
        <div>
          <div style="font-size:1rem;font-weight:600;color:var(--text-bright);">${guide.title}</div>
          <div style="font-size:0.75rem;color:var(--text-dim);">${guide.source || ''}</div>
        </div>
      </div>
      <div class="reader-body">${md(guide.content)}</div>
    </div>
  `;
}

function filterGuides(query) {
  state.searchQuery = query;
  const q = query.toLowerCase();
  document.querySelectorAll('.category-card').forEach(card => {
    let hasMatch = false;
    card.querySelectorAll('.guide-item').forEach(item => {
      const title = item.querySelector('.guide-title').textContent.toLowerCase();
      const match = !q || title.includes(q);
      item.style.display = match ? '' : 'none';
      if (match) hasMatch = true;
    });
    card.style.display = hasMatch ? '' : 'none';
    if (q && hasMatch) {
      card.querySelector('.category-guides').style.display = 'block';
    }
  });
}

async function renderFeed(area, title, actions) {
  title.textContent = 'Telegram Feed';
  actions.innerHTML = '<button class="btn btn-gold btn-sm" id="syncBtn" onclick="syncPosts()">&#8635; Sync Now</button>';
  area.innerHTML = '<div class="spinner"></div>';

  if (!state.posts) state.posts = await api('/posts');

  const posts = state.posts.posts || [];
  let html = `<div style="font-size:0.78rem;color:var(--text-dim);margin-bottom:16px;">
    ${posts.length} posts captured | Last sync: ${state.posts.last_sync ? new Date(state.posts.last_sync).toLocaleString() : 'Never'}
  </div>`;

  if (posts.length === 0) {
    html += '<div class="card" style="text-align:center;padding:40px;"><div style="font-size:1.2rem;margin-bottom:8px;">No posts yet</div><div style="color:var(--text-dim);">Click "Sync Now" to fetch latest posts from Miko\'s Lab</div></div>';
  } else {
    for (const post of posts.slice().reverse()) {
      html += `
        <div class="post-card">
          <div class="post-date">${post.date ? new Date(post.date).toLocaleString() : 'Unknown date'} &middot; Post #${post.id || '?'}</div>
          <div class="post-text">${escapeHtml(post.text || '').slice(0, 800)}</div>
          ${post.links && post.links.length ? `<div class="post-links">${post.links.map(l => `<a class="post-link" href="${l.url}" target="_blank">&#128279; ${l.text || l.url}</a>`).join('')}</div>` : ''}
          ${post.photos && post.photos.length ? `<div class="post-photos">${post.photos.map(p => `<img src="${p}" alt="photo" loading="lazy">`).join('')}</div>` : ''}
        </div>
      `;
    }
  }
  area.innerHTML = html;
}

async function syncPosts() {
  const btn = document.getElementById('syncBtn');
  btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px;"></div> Syncing...';
  btn.disabled = true;

  try {
    const result = await api('/sync', { method: 'POST' });
    if (result.success) {
      state.posts = null;
      state.overview = null;
      renderPage();
    } else {
      alert('Sync failed: ' + (result.error || 'Unknown error'));
    }
  } catch (e) {
    alert('Sync error: ' + e.message);
  }
  btn.innerHTML = '&#8635; Sync Now';
  btn.disabled = false;
}

async function generateImage() {
  const prompt = document.getElementById('framePrompt').value;
  if (!prompt) { alert('Enter a prompt first'); return; }
  const el = document.getElementById('genResult');
  el.innerHTML = '<div style="display:flex;align-items:center;gap:8px;"><div class="spinner"></div> Generating image...</div>';
  try {
    const result = await api('/generate/image', { method: 'POST', body: JSON.stringify({ prompt }) });
    if (result.success) {
      el.innerHTML = `<div style="color:var(--success);font-size:0.85rem;">Image generated successfully!</div><pre style="background:var(--bg);padding:10px;border-radius:var(--radius);font-size:0.78rem;margin-top:8px;max-height:200px;overflow:auto;">${escapeHtml(result.output)}</pre>`;
    } else {
      el.innerHTML = `<div style="color:var(--danger);font-size:0.85rem;">Error: ${escapeHtml(result.error || 'Unknown')}</div>`;
    }
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:0.85rem;">Request failed: ${e.message}</div>`;
  }
}

async function renderTools(area, title, actions) {

  const t = state.tools;
  const sections = [
    { key: 'image_generation', name: 'Image Generation', icon: '&#128248;' },
    { key: 'video_generation', name: 'Video Generation', icon: '&#127909;' },
    { key: 'social_posting', name: 'Social Media Posting', icon: '&#128225;' },
    { key: 'content_creation', name: 'Content Creation', icon: '&#9999;' },
  ];

  let html = '';
  for (const sec of sections) {
    const tools = t[sec.key] || [];
    html += `<div style="margin-bottom:24px;"><h3 style="font-size:0.95rem;color:var(--text-bright);margin-bottom:12px;">${sec.icon} ${sec.name}</h3><div class="grid grid-2" style="gap:12px;">`;
    for (const tool of tools) {
      html += `
        <div class="tool-card">
          <div class="tool-name">${tool.name}</div>
          <div class="tool-desc">${tool.description}</div>
          <span class="tool-status ${tool.available ? 'available' : 'unavailable'}">
            ${tool.available ? '&#10003; Available' : '&#10007; Not Found'}
          </span>
          ${tool.script ? `<div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px;font-family:monospace;">${tool.script.split('/').slice(-1)}</div>` : ''}
        </div>
      `;
    }
    html += '</div></div>';
  }
  area.innerHTML = html;
}

  [0,1,2,3].forEach(i => {
    const el = document.getElementById(`promptTab${i}`);
    if (el) el.classList.toggle('active', i === idx);
  });
  btn.closest('.tabs').querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === idx));
}

function buildVeoPrompt() {
  const subject = document.getElementById('veo_subject').value || '[Subject]';
  const action = document.getElementById('veo_action').value || '[Action]';
  const context = document.getElementById('veo_context').value || '[Context]';
  const camera = document.getElementById('veo_camera').value;
  const dialogue = document.getElementById('veo_dialogue').value;

  let prompt = `${subject} ${action} in ${context}. ${camera} captures the scene with cinematic depth. Warm natural lighting, ambient room sounds. (no subtitles!)`;
  if (dialogue) {
    prompt += `\n\nSpoken lines:\nCharacter: "${dialogue}"`;
  }

  const el = document.getElementById('veoOutput');
  el.style.display = 'block';
  el.innerHTML = `${escapeHtml(prompt)}<button class="copy-btn" onclick="copyText(\`${prompt.replace(/`/g,"'")}\`)">Copy</button>`;
}

function buildNbPrompt() {
  const char = document.getElementById('nb_char').value || '[Character description]';
  const scene = document.getElementById('nb_scene').value || '[Scene]';
  const ratio = document.getElementById('nb_ratio').value;

  const prompt = `Create a photorealistic image of ${char}. Scene: ${scene}. Aspect ratio: ${ratio}. Style: Ultra-realistic photography, shot on Sony A7III, 85mm lens, f/1.8, natural lighting. Maintain exact character consistency for future generations.`;

  const el = document.getElementById('nbOutput');
  el.style.display = 'block';
  el.innerHTML = `${escapeHtml(prompt)}<button class="copy-btn" onclick="copyText(\`${prompt.replace(/`/g,"'")}\`)">Copy</button>`;
}

// ===== UTILITIES =====
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--gold);color:#1a1a1e;padding:8px 16px;border-radius:6px;font-size:0.82rem;font-weight:600;z-index:9999;';
    toast.textContent = 'Copied to clipboard!';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  });
}

// ===== INIT =====
async function init() {
  try {
    const overview = await api('/overview');
    state.overview = overview;
    const syncDot = document.getElementById('syncDot');
    const syncText = document.getElementById('syncText');
    if (overview.last_sync) {
      const lastSync = new Date(overview.last_sync);
      const hoursAgo = (Date.now() - lastSync.getTime()) / (1000 * 60 * 60);
      syncDot.className = hoursAgo > 24 ? 'sync-dot stale' : 'sync-dot';
      syncText.textContent = `Synced ${hoursAgo < 1 ? 'just now' : hoursAgo < 24 ? Math.round(hoursAgo) + 'h ago' : Math.round(hoursAgo/24) + 'd ago'}`;
    } else {
      syncDot.className = 'sync-dot stale';
      syncText.textContent = 'Never synced';
    }
  } catch (e) {
    console.error('Init error:', e);
  }
  renderPage();
}

init();
</script>
