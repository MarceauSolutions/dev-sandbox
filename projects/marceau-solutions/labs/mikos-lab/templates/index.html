<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miko's Lab — AI Avatar Workshop</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C9963C;
  --gold-light: #e8c777;
  --gold-dim: rgba(201,150,60,0.15);
  --bg: #1a1a1e;
  --bg-card: #242428;
  --bg-sidebar: #1e1e22;
  --bg-hover: #2e2e34;
  --text: #e8e8ec;
  --text-dim: #9898a4;
  --text-bright: #ffffff;
  --border: #333338;
  --success: #4ade80;
  --warning: #fbbf24;
  --danger: #f87171;
  --info: #60a5fa;
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-w: 260px;
}
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}
a { color: var(--gold); text-decoration: none; }
a:hover { color: var(--gold-light); }
button { cursor: pointer; font-family: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.sidebar-header {
  padding: 20px 18px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 1.15rem;
  color: var(--gold);
  font-weight: 700;
  letter-spacing: 0.5px;
}
.sidebar-header .subtitle {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 4px;
}
.nav-section { padding: 14px 0 6px; }
.nav-section-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  padding: 0 18px;
  margin-bottom: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  color: var(--text-dim);
  font-size: 0.88rem;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active {
  background: var(--gold-dim);
  color: var(--gold);
  border-left-color: var(--gold);
}
.nav-icon { width: 18px; text-align: center; font-size: 0.95rem; }
.sidebar-footer {
  margin-top: auto;
  padding: 14px 18px;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-dim);
}
.sync-status { display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
.sync-dot.stale { background: var(--warning); }

/* ===== MAIN CONTENT ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-sidebar);
  min-height: 52px;
}
.topbar h2 { font-size: 1.05rem; color: var(--text-bright); }
.topbar-actions { display: flex; gap: 8px; }
.content-area { flex: 1; overflow-y: auto; padding: 24px; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.82rem;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-gold { background: var(--gold); color: #1a1a1e; border-color: var(--gold); font-weight: 600; }
.btn-gold:hover { background: var(--gold-light); }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(248,113,113,0.15); }
.btn-success { border-color: var(--success); color: var(--success); }
.btn-success:hover { background: rgba(74,222,128,0.15); }
.btn-sm { padding: 5px 10px; font-size: 0.78rem; }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 1rem; font-weight: 600; color: var(--text-bright); }
.card-subtitle { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }

/* ===== GRID ===== */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 1200px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }

/* ===== STAT CARDS ===== */
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  text-align: center;
}
.stat-value { font-size: 2rem; font-weight: 700; color: var(--gold); }
.stat-label { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }

/* ===== CATEGORY CARDS ===== */
.category-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color 0.2s;
}
.category-card:hover { border-color: var(--gold); }
.category-header {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.category-header .cat-icon {
  width: 36px; height: 36px;
  background: var(--gold-dim);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}
.category-header h3 { font-size: 0.95rem; color: var(--text-bright); }
.category-header .count {
  margin-left: auto;
  background: var(--gold-dim);
  color: var(--gold);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.72rem;
  font-weight: 600;
}
.category-guides { padding: 8px 0; }
.guide-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  cursor: pointer;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}
.guide-item:hover { background: var(--bg-hover); border-left-color: var(--gold); }
.guide-item .guide-title { font-size: 0.85rem; color: var(--text); }

/* ===== READER ===== */
.reader-panel { display: none; flex-direction: column; height: 100%; }
.reader-panel.active { display: flex; }
.reader-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.reader-back {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  padding: 6px 10px;
  font-size: 0.82rem;
}
.reader-back:hover { border-color: var(--gold); color: var(--gold); }
.reader-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  line-height: 1.7;
  font-size: 0.92rem;
}
.reader-body h1, .reader-body h2, .reader-body h3 { color: var(--gold); margin: 20px 0 10px; }
.reader-body h1 { font-size: 1.4rem; }
.reader-body h2 { font-size: 1.15rem; }
.reader-body h3 { font-size: 1rem; }
.reader-body p { margin-bottom: 12px; }
.reader-body ul, .reader-body ol { margin: 8px 0 12px 24px; }
.reader-body li { margin-bottom: 4px; }
.reader-body code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }
.reader-body pre { background: var(--bg); padding: 14px; border-radius: var(--radius); overflow-x: auto; margin: 12px 0; }
.reader-body blockquote { border-left: 3px solid var(--gold); padding-left: 14px; color: var(--text-dim); margin: 12px 0; }
.reader-body table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.reader-body th, .reader-body td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; font-size: 0.85rem; }
.reader-body th { background: var(--bg); color: var(--gold); }

/* ===== POSTS ===== */
.post-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 12px;
}
.post-date { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 6px; }
.post-text { font-size: 0.88rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
.post-links { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
.post-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: var(--gold-dim);
  border-radius: 4px;
  font-size: 0.75rem;
  color: var(--gold);
}

/* ===== PROGRESS BAR ===== */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ===== PROJECT CARDS ===== */
.project-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
}
.project-card:hover { border-color: var(--gold); transform: translateY(-2px); }
.project-status {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 600;
}
.status-planning { background: rgba(96,165,250,0.15); color: var(--info); }
.status-character_design { background: rgba(168,85,247,0.15); color: #a855f7; }
.status-content_creation { background: var(--gold-dim); color: var(--gold); }
.status-launched { background: rgba(74,222,128,0.15); color: var(--success); }
.status-paused { background: rgba(248,113,113,0.15); color: var(--danger); }

/* ===== METHOD TRACKER ===== */
.method-row {
  display: grid;
  grid-template-columns: 1fr 120px 100px 100px 80px;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
}
.method-row:hover { background: var(--bg-hover); }
.method-header { color: var(--text-dim); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
.method-header:hover { background: transparent; }

/* ===== STATUS SELECTS ===== */
select.status-select {
  padding: 4px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 0.78rem;
  cursor: pointer;
}
select.status-select:focus { outline: none; border-color: var(--gold); }

/* ===== FORMS ===== */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 0.82rem; color: var(--text-dim); margin-bottom: 6px; }
.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.88rem;
  font-family: inherit;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--gold); }
.form-textarea { min-height: 100px; resize: vertical; }

/* ===== PROMPT OUTPUT ===== */
.prompt-output {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--gold-light);
  min-height: 80px;
  white-space: pre-wrap;
  position: relative;
}
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  padding: 4px 8px;
  font-size: 0.72rem;
  cursor: pointer;
}
.copy-btn:hover { color: var(--gold); border-color: var(--gold); }

/* ===== TABS ===== */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab {
  padding: 8px 16px;
  font-size: 0.85rem;
  color: var(--text-dim);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  background: none;
  border-top: none; border-left: none; border-right: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ===== STARS ===== */
.stars { display: inline-flex; gap: 2px; cursor: pointer; }
.star { color: var(--border); font-size: 1rem; transition: color 0.1s; }
.star.active { color: var(--gold); }
.star:hover { color: var(--gold-light); }

/* ===== SEARCH ===== */
.search-box { position: relative; margin-bottom: 16px; }
.search-box input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.88rem;
}
.search-box input:focus { outline: none; border-color: var(--gold); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 0.85rem; }

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-title { font-size: 1.1rem; font-weight: 700; color: var(--text-bright); margin-bottom: 16px; }

/* ===== SPINNER ===== */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== BADGE ===== */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
.badge-gold { background: var(--gold-dim); color: var(--gold); }
.badge-green { background: rgba(74,222,128,0.15); color: var(--success); }
.badge-blue { background: rgba(96,165,250,0.15); color: var(--info); }
.badge-red { background: rgba(248,113,113,0.15); color: var(--danger); }
.badge-yellow { background: rgba(251,191,36,0.15); color: var(--warning); }

.hidden { display: none !important; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<nav class="sidebar">
  <div class="sidebar-header">
    <h1>MIKO'S LAB</h1>
    <div class="subtitle">AI Avatar Workshop</div>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Overview</div>
    <a class="nav-item active" data-page="dashboard" href="#">
      <span class="nav-icon">&#9632;</span> Dashboard
    </a>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Build</div>
    <a class="nav-item" data-page="projects" href="#">
      <span class="nav-icon">&#128640;</span> My Projects
    </a>
    <a class="nav-item" data-page="tracker" href="#">
      <span class="nav-icon">&#9745;</span> Method Tracker
    </a>
    <a class="nav-item" data-page="prompt-lib" href="#">
      <span class="nav-icon">&#10002;</span> Prompt Library
    </a>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Learn</div>
    <a class="nav-item" data-page="knowledge" href="#">
      <span class="nav-icon">&#9733;</span> Knowledge Library
    </a>
    <a class="nav-item" data-page="methods" href="#">
      <span class="nav-icon">&#9881;</span> Methods Summary
    </a>
    <a class="nav-item" data-page="feed" href="#">
      <span class="nav-icon">&#9993;</span> Telegram Feed
    </a>
    <a class="nav-item" data-page="pdfs" href="#">
      <span class="nav-icon">&#128196;</span> PDF Library
    </a>
  </div>

    </a>
  </div>

  <div class="sidebar-footer">
    <div class="sync-status">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">Loading...</span>
    </div>

</nav>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="topbar">
    <h2 id="pageTitle">Dashboard</h2>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>
  <div class="content-area" id="contentArea"></div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ===== STATE =====
const state = {
  page: 'dashboard',
  overview: null,
  knowledge: null,
  methods: null,
  posts: null,
  tools: null,
  projects: null,
  currentProject: null,
  methodTracker: null,
  promptLib: null,
  readerGuide: null,
  searchQuery: '',
};

// ===== API =====
async function api(path, opts = {}) {
  const resp = await fetch(`/api${path}`, {
    headers: {'Content-Type': 'application/json'},
    ...opts,
  });
  return resp.json();
}

// ===== NAV =====
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', e => {
    e.preventDefault();
    navigate(item.dataset.page);
  });
});

function navigate(page) {
  state.page = page;
  state.readerGuide = null;
  state.currentProject = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
  renderPage();
}

// ===== MODAL =====
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// ===== MARKDOWN RENDERER =====
function md(text) {
  if (!text) return '';
  let html = text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');
  html = html.replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)+)/g, (match, header, rows) => {
    const ths = header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });
  return `<p>${html}</p>`;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function statusLabel(s) {
  const map = {
    planning: 'Planning', character_design: 'Character Design', content_creation: 'Creating Content',
    launched: 'Launched', paused: 'Paused', archived: 'Archived',
    not_started: 'Not Started', learning: 'Learning', tried: 'Tried',
    works: 'Works!', doesnt_work: "Doesn't Work", needs_revisit: 'Revisit',
    pending: 'Pending', in_progress: 'In Progress', completed: 'Done', skipped: 'Skipped',
  };
  return map[s] || s;
}

function starsHtml(rating, onClick) {
  let h = '<span class="stars">';
  for (let i = 1; i <= 5; i++) {
    h += `<span class="star ${i <= (rating||0) ? 'active' : ''}" onclick="${onClick}(${i})">&#9733;</span>`;
  }
  return h + '</span>';
}

// ===== PAGE ROUTER =====
function renderPage() {
  const area = document.getElementById('contentArea');
  const title = document.getElementById('pageTitle');
  const actions = document.getElementById('topbarActions');
  actions.innerHTML = '';

  switch (state.page) {
    case 'dashboard': renderDashboard(area, title, actions); break;
    case 'projects': renderProjects(area, title, actions); break;
    case 'project-detail': renderProjectDetail(area, title, actions); break;
    case 'tracker': renderTracker(area, title, actions); break;
    case 'prompt-lib': renderPromptLib(area, title, actions); break;
    case 'knowledge': renderKnowledge(area, title, actions); break;
    case 'methods': renderMethods(area, title, actions); break;
    case 'feed': renderFeed(area, title, actions); break;
    case 'pdfs': renderPdfs(area, title, actions); break;
    case 'tools': renderTools(area, title, actions); break;
  }
}

function updateSyncStatus(lastSync) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if (!lastSync) {
    dot.className = 'sync-dot stale';
    text.textContent = 'Never synced';
    return;
  }
  const hrs = (Date.now() - new Date(lastSync).getTime()) / 3600000;
  if (hrs > 24) {
    dot.className = 'sync-dot stale';
    text.textContent = `${Math.floor(hrs / 24)}d ago`;
  } else {
    dot.className = 'sync-dot';
    text.textContent = `${Math.floor(hrs)}h ago`;
  }
}

async function syncPosts() {
  const btn = event.target;
  const orig = btn.innerHTML;
  btn.innerHTML = '&#8987; Syncing...';
  btn.disabled = true;
  try {
    const result = await api('/sync', { method: 'POST' });
    if (result.success) {
      state.posts = null;
      state.overview = null;
      renderPage();
    } else {
      alert('Sync failed: ' + (result.error || 'Unknown'));
    }
  } catch(e) { alert('Sync error: ' + e.message); }
  btn.innerHTML = orig;
  btn.disabled = false;
}

  // Group by category

  for (const m of state.methodTracker) {
    const cat = m.category || 'uncategorized';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(m);
  }

  // Stats
  const total = state.methodTracker.length;
  const tried = state.methodTracker.filter(m => ['tried','works','doesnt_work'].includes(m.status)).length;
  const working = state.methodTracker.filter(m => m.status === 'works').length;

  let html = `
    <div class="grid grid-3" style="margin-bottom:20px;">
      <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Methods</div></div>
      <div class="stat-card"><div class="stat-value">${tried}</div><div class="stat-label">Tried</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--success)">${working}</div><div class="stat-label">Working</div></div>
    </div>
  `;

  const catNames = {
    'getting-started': 'Getting Started', 'character-creation': 'Character Creation',
    'video-generation': 'Video Generation', 'voice-audio': 'Voice & Audio',
    'monetization': 'Monetization', 'optimization': 'Optimization',
    'advanced': 'Advanced', 'uncategorized': 'Other',
  };

  for (const [cat, methods] of Object.entries(grouped)) {
    html += `
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <div class="card-title">${catNames[cat] || cat}</div>
          <span class="badge badge-gold">${methods.length}</span>
        </div>
        <div class="method-row method-header">
          <span>Method</span><span>Status</span><span>Difficulty</span><span>Tools</span><span>Rating</span>
        </div>
        ${methods.map(m => `
          <div class="method-row">
            <div>
              <div style="font-weight:600;color:var(--text-bright);">${escapeHtml(m.method_name)}</div>
              <div style="font-size:0.72rem;color:var(--text-dim);">${escapeHtml(m.source)}</div>
              ${m.my_notes ? `<div style="font-size:0.75rem;color:var(--text-dim);margin-top:2px;">&#128221; ${escapeHtml(m.my_notes).slice(0,80)}</div>` : ''}
            </div>
            <select class="status-select" onchange="updateMethod(${m.id},'status',this.value)">
              <option value="not_started" ${m.status==='not_started'?'selected':''}>Not Started</option>
              <option value="learning" ${m.status==='learning'?'selected':''}>Learning</option>
              <option value="tried" ${m.status==='tried'?'selected':''}>Tried</option>
              <option value="works" ${m.status==='works'?'selected':''}>Works!</option>
              <option value="doesnt_work" ${m.status==='doesnt_work'?'selected':''}>Doesn't Work</option>
              <option value="needs_revisit" ${m.status==='needs_revisit'?'selected':''}>Revisit</option>
            </select>
            <span class="badge badge-${m.difficulty==='easy'?'green':m.difficulty==='hard'?'red':'yellow'}">${m.difficulty}</span>
            <span style="font-size:0.78rem;color:var(--text-dim);">${escapeHtml(m.tools_needed).slice(0,30)}</span>
            <span style="cursor:pointer;" onclick="showMethodDetail(${m.id})">
              ${m.rating ? '&#9733;'.repeat(m.rating) : '<span style="color:var(--text-dim);font-size:0.75rem;">Rate</span>'}
            </span>
          </div>
        `).join('')}
      </div>`;
  }

  area.innerHTML = html;
}

async function updateMethod(id, field, value) {
  await api(`/methods/tracker/${id}`, { method: 'PUT', body: JSON.stringify({ [field]: value }) });
}

function showMethodDetail(id) {
  const m = state.methodTracker.find(x => x.id === id);
  if (!m) return;
  openModal(`
    <div class="modal-title">${escapeHtml(m.method_name)}</div>
    <div style="font-size:0.82rem;color:var(--text-dim);margin-bottom:16px;">
      ${m.source ? `Source: ${escapeHtml(m.source)}` : ''} &middot; Cost: ${escapeHtml(m.cost_estimate||'Unknown')} &middot; Tools: ${escapeHtml(m.tools_needed||'N/A')}
    </div>
    <div class="form-group"><label class="form-label">My Notes</label><textarea class="form-textarea" id="md-notes" rows="3">${escapeHtml(m.my_notes||'')}</textarea></div>
    <div class="form-group"><label class="form-label">Results / What Happened</label><textarea class="form-textarea" id="md-results" rows="3">${escapeHtml(m.results||'')}</textarea></div>
    <div class="form-group"><label class="form-label">Rating (1-5)</label>
      <select class="form-select" id="md-rating">
        <option value="">Not rated</option>
        ${[1,2,3,4,5].map(i => `<option value="${i}" ${m.rating===i?'selected':''}>${i} star${i>1?'s':''}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveMethodDetail(${id})">Save</button>
    </div>
  `);
}

async function saveMethodDetail(id) {
  const rating = document.getElementById('md-rating').value;
  await api(`/methods/tracker/${id}`, {
    method: 'PUT',
    body: JSON.stringify({
      my_notes: document.getElementById('md-notes').value,
      results: document.getElementById('md-results').value,
      rating: rating ? parseInt(rating) : null,
    }),
  });
  closeModal();
  state.methodTracker = null;
  renderPage();
}

function showAddMethodModal() {
  openModal(`
    <div class="modal-title">Add Custom Method</div>
    <div class="form-group"><label class="form-label">Method Name *</label><input class="form-input" id="am-name"></div>
    <div class="grid grid-2">
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-select" id="am-cat">
          <option value="character-creation">Character Creation</option>
          <option value="video-generation">Video Generation</option>
          <option value="voice-audio">Voice & Audio</option>
          <option value="monetization">Monetization</option>
          <option value="optimization">Optimization</option>
          <option value="advanced">Advanced</option>
          <option value="getting-started">Getting Started</option>
        </select></div>
      <div class="form-group"><label class="form-label">Difficulty</label>
        <select class="form-select" id="am-diff"><option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option></select></div>
    </div>
    <div class="form-group"><label class="form-label">Source</label><input class="form-input" id="am-source" placeholder="e.g., Telegram post, PDF name"></div>
    <div class="form-group"><label class="form-label">Tools Needed</label><input class="form-input" id="am-tools"></div>
    <div class="form-group"><label class="form-label">Estimated Cost</label><input class="form-input" id="am-cost"></div>

async function addMethod() {
  const name = document.getElementById('am-name').value.trim();
  if (!name) { alert('Name required'); return; }
  await api('/methods/tracker', {
    method: 'POST',
    body: JSON.stringify({
      method_name: name,
      category: document.getElementById('am-cat').value,
      difficulty: document.getElementById('am-diff').value,
      source: document.getElementById('am-source').value,
      tools_needed: document.getElementById('am-tools').value,
      cost_estimate: document.getElementById('am-cost').value,
    }),
  });
  closeModal();
  state.methodTracker = null;
  renderPage();
}

// ===================================================================
// PROMPT LIBRARY
// ===================================================================
async function renderPromptLib(area, title, actions) {
  title.textContent = 'Prompt Library';
  actions.innerHTML = '<button class="btn btn-gold btn-sm" onclick="showNewPromptModal()">+ Save Prompt</button>';
  area.innerHTML = '<div style="display:flex;justify-content:center;padding:40px;"><div class="spinner"></div></div>';

  state.promptLib = await api('/prompts');

  if (!state.promptLib.length) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#10002;</div>
        <h3>No saved prompts yet</h3>
        <p style="margin-bottom:16px;">Save prompts that work so you can reuse them. Track what produces the best results.</p>
        <button class="btn btn-gold" onclick="showNewPromptModal()">+ Save First Prompt</button>
      </div>`;
    return;
  }

  // Group by category
  const cats = {};
  for (const p of state.promptLib) {
    const c = p.category || 'general';
    if (!cats[c]) cats[c] = [];
    cats[c].push(p);
  }

  let html = '';
  const catNames = { character: 'Character', video: 'Video', voice: 'Voice', image: 'Image', social: 'Social', general: 'General' };

  for (const [cat, prompts] of Object.entries(cats)) {
    html += `<div style="margin-bottom:8px;font-size:0.82rem;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.5px;">${catNames[cat]||cat}</div>`;
    for (const p of prompts) {
      html += `
        <div class="card" style="padding:14px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
            <div>
              <span style="font-weight:600;color:var(--text-bright);">${escapeHtml(p.name)}</span>
              ${p.is_favorite ? '<span style="color:var(--gold);margin-left:6px;">&#9733;</span>' : ''}
              ${p.tool ? `<span class="badge badge-blue" style="margin-left:6px;">${escapeHtml(p.tool)}</span>` : ''}
            </div>
            <div style="display:flex;gap:4px;">
              <button class="btn btn-sm" onclick="copyPrompt(${p.id})">Copy</button>
              <button class="btn btn-sm" onclick="toggleFav(${p.id},${p.is_favorite?0:1})">${p.is_favorite?'&#9733;':'&#9734;'}</button>
              <button class="btn btn-sm btn-danger" onclick="deletePrompt(${p.id})">&#10005;</button>
            </div>
          </div>
          <div class="prompt-output" id="prompt-${p.id}" style="min-height:auto;max-height:120px;overflow:hidden;">${escapeHtml(p.prompt_text)}</div>
          ${p.notes ? `<div style="font-size:0.75rem;color:var(--text-dim);margin-top:6px;">${escapeHtml(p.notes)}</div>` : ''}
          ${p.result_quality ? `<div style="margin-top:4px;">${'&#9733;'.repeat(p.result_quality)}<span style="font-size:0.72rem;color:var(--text-dim);margin-left:4px;">quality</span></div>` : ''}
        </div>`;
    }
  }
  area.innerHTML = html;
}

function showNewPromptModal() {
  openModal(`
    <div class="modal-title">Save Prompt</div>
    <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="sp-name" placeholder="e.g., Fitness character base prompt"></div>
    <div class="grid grid-2">
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-select" id="sp-cat">
          <option value="character">Character</option>
          <option value="image">Image</option>
          <option value="video">Video</option>
          <option value="voice">Voice</option>
          <option value="social">Social</option>
          <option value="general">General</option>
        </select></div>
      <div class="form-group"><label class="form-label">Tool</label><input class="form-input" id="sp-tool" placeholder="e.g., NanoBanana, Sora 2"></div>
    </div>
    <div class="form-group"><label class="form-label">Prompt Text *</label><textarea class="form-textarea" id="sp-text" rows="6"></textarea></div>
    <div class="form-group"><label class="form-label">Notes / Results</label><input class="form-input" id="sp-notes"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveNewPrompt()">Save</button>
    </div>
  `);
}

async function saveNewPrompt() {
  const name = document.getElementById('sp-name').value.trim();
  const text = document.getElementById('sp-text').value.trim();
  if (!name || !text) { alert('Name and prompt text required'); return; }
  await api('/prompts', {
    method: 'POST',
    body: JSON.stringify({
      name,
      category: document.getElementById('sp-cat').value,
      tool: document.getElementById('sp-tool').value,
      prompt_text: text,
      notes: document.getElementById('sp-notes').value,
    }),
  });
  closeModal();
  state.promptLib = null;
  renderPage();
}

function copyPrompt(id) {
  const el = document.getElementById(`prompt-${id}`);
  navigator.clipboard.writeText(el.textContent);
  const btn = event.target;
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

async function toggleFav(id, val) {
  await api(`/prompts/${id}`, { method: 'PUT', body: JSON.stringify({ is_favorite: val }) });
  state.promptLib = null;
  renderPage();
}

async function deletePrompt(id) {
  if (!confirm('Delete this prompt?')) return;
  await api(`/prompts/${id}`, { method: 'DELETE' });
  state.promptLib = null;
  renderPage();
}

// ===================================================================
// KNOWLEDGE LIBRARY
// ===================================================================
async function renderKnowledge(area, title, actions) {
  title.textContent = 'Knowledge Library';
  actions.innerHTML = '<button class="btn btn-sm" onclick="navigate(\'methods\')">Methods Summary</button>';

  if (state.readerGuide) { renderGuideReader(area); return; }

  area.innerHTML = '<div style="display:flex;justify-content:center;padding:40px;"><div class="spinner"></div></div>';
  if (!state.knowledge) state.knowledge = await api('/knowledge');
  const cats = state.knowledge;

  let html = `<div class="search-box"><span class="search-icon">&#128269;</span><input type="text" placeholder="Search guides..." id="guideSearch" value="${state.searchQuery}" oninput="filterGuides(this.value)"></div>`;
  const iconMap = {rocket:'&#128640;',user:'&#128100;',video:'&#127909;',microphone:'&#127908;','dollar-sign':'&#128176;',settings:'&#9881;',zap:'&#9889;'};

  for (const [key, cat] of Object.entries(cats)) {
    if (!cat.guides || cat.guides.length === 0) continue;
    html += `
      <div class="category-card" data-category="${key}">
        <div class="category-header" onclick="toggleCategory('${key}')">
          <div class="cat-icon">${iconMap[cat.icon]||'&#9733;'}</div>
          <div><h3>${cat.name}</h3><div style="font-size:0.75rem;color:var(--text-dim);">${cat.description}</div></div>
          <span class="count">${cat.guides.length}</span>
        </div>
        <div class="category-guides" id="cat-${key}" style="display:none;">
          ${cat.guides.map((g,i) => `
            <div class="guide-item" onclick="openGuide('${key}',${i})">
              <span style="color:var(--text-dim);font-size:0.8rem;">&#9654;</span>
              <span class="guide-title">${g.title}</span>
            </div>`).join('')}
        </div>
      </div>`;
  }
  area.innerHTML = html;
}

function toggleCategory(key) {
  const el = document.getElementById(`cat-${key}`);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function openGuide(catKey, idx) { state.readerGuide = { catKey, idx }; renderPage(); }

function renderGuideReader(area) {
  const { catKey, idx } = state.readerGuide;
  const guide = state.knowledge[catKey].guides[idx];
  area.innerHTML = `
    <div class="reader-panel active">
      <div class="reader-header">
        <button class="reader-back" onclick="state.readerGuide=null;renderPage();">&#8592; Back</button>
        <div>
          <div style="font-size:1rem;font-weight:600;color:var(--text-bright);">${guide.title}</div>
          <div style="font-size:0.75rem;color:var(--text-dim);">${guide.source || ''}</div>
        </div>
      </div>
      <div class="reader-body">${md(guide.content)}</div>
    </div>`;
}

function filterGuides(query) {
  state.searchQuery = query;
  const q = query.toLowerCase();
  document.querySelectorAll('.category-card').forEach(card => {
    let hasMatch = false;
    card.querySelectorAll('.guide-item').forEach(item => {
      const match = !q || item.querySelector('.guide-title').textContent.toLowerCase().includes(q);
      item.style.display = match ? '' : 'none';
      if (match) hasMatch = true;
    });
    card.style.display = hasMatch ? '' : 'none';
    if (q && hasMatch) card.querySelector('.category-guides').style.display = 'block';
  });
}

async function renderMethods(area, title, actions) {

// ===================================================================
async function renderFeed(area, title, actions) {
  title.textContent = 'Telegram Feed';
  actions.innerHTML = '<button class="btn btn-gold btn-sm" onclick="syncPosts()">&#8635; Sync Now</button>';
  area.innerHTML = '<div style="display:flex;justify-content:center;padding:40px;"><div class="spinner"></div></div>';

  if (!state.posts) state.posts = await api('/posts');
  const posts = state.posts.posts || [];

  let html = `<div style="font-size:0.78rem;color:var(--text-dim);margin-bottom:16px;">
    ${posts.length} posts captured | Last sync: ${state.posts.last_sync ? new Date(state.posts.last_sync).toLocaleString() : 'Never'}
  </div>`;

  if (!posts.length) {
    html += '<div class="empty-state"><div class="empty-icon">&#9993;</div><h3>No posts yet</h3><p>Click "Sync Now" to fetch latest posts from Miko\'s Lab</p></div>';
  } else {
    for (const post of posts.slice().reverse()) {
      html += `
        <div class="post-card">
          <div class="post-date">${post.date ? new Date(post.date).toLocaleString() : 'Unknown'} &middot; Post #${post.id || '?'}</div>
          <div class="post-text">${escapeHtml(post.text || '').slice(0, 800)}</div>
          ${post.links?.length ? `<div class="post-links">${post.links.map(l => `<a class="post-link" href="${l.url}" target="_blank">&#128279; ${l.text || l.url}</a>`).join('')}</div>` : ''}
        </div>`;
    }
  }
  area.innerHTML = html;
}
