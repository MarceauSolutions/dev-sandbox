<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaunchPad — Product Launch Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-mark">▲</span>
      <span class="brand-name">LaunchPad</span>
      <span class="brand-sub">Iterative Product Launch</span>
    </div>
    <div class="header-right">
      <select id="productSelect" class="product-select" title="Switch product"></select>
      <span class="sync-indicator" id="syncDot" title="Auto-refresh active"></span>
    </div>
  </div>
</header>

<!-- ── Phase Timeline ─────────────────────────────────────────────────── -->
<section class="phase-section">
  <div class="phase-timeline" id="phaseTimeline">
    <!-- injected by JS -->
  </div>
</section>

<!-- ── Metrics Row ────────────────────────────────────────────────────── -->
<section class="metrics-section">
  <div class="metrics-grid">

    <div class="metric-card" id="metricSignups">
      <div class="metric-label">Waitlist Signups</div>
      <div class="metric-value" id="signupCount">—</div>
      <div class="metric-bar-wrap">
        <div class="metric-bar-track">
          <div class="metric-bar-fill" id="signupBar" style="width:0%"></div>
        </div>
        <span class="metric-bar-goal" id="signupGoal">Goal: 100</span>
      </div>
      <div class="metric-sub" id="signupVelocity"></div>
    </div>

    <div class="metric-card" id="metricTime">
      <div class="metric-label">Validation Window</div>
      <div class="metric-value" id="timeRemaining">—</div>
      <div class="metric-bar-wrap">
        <div class="metric-bar-track">
          <div class="metric-bar-fill metric-bar-time" id="timeBar" style="width:0%"></div>
        </div>
        <span class="metric-bar-goal">48h window</span>
      </div>
      <div class="metric-sub" id="validationStarted"></div>
    </div>

    <div class="metric-card" id="metricPosts">
      <div class="metric-label">Posts Completed</div>
      <div class="metric-value" id="postsCount">—</div>
      <div class="metric-bar-wrap">
        <div class="metric-bar-track">
          <div class="metric-bar-fill metric-bar-posts" id="postsBar" style="width:0%"></div>
        </div>
        <span class="metric-bar-goal" id="postsGoal">of — platforms</span>
      </div>
      <div class="metric-sub" id="milestonesHit"></div>
    </div>

    <div class="metric-card gate-card" id="metricGate">
      <div class="metric-label">Gate Decision</div>
      <div class="metric-value gate-value" id="gateDecision">PENDING</div>
      <div class="metric-sub">
        <button class="btn btn-sm btn-outline" id="runGateBtn" onclick="runGate()">Run Gate Now</button>
      </div>
    </div>

  </div>
</section>

<!-- ── UTM Breakdown ──────────────────────────────────────────────────── -->
<section class="utm-section" id="utmSection" style="display:none">
  <div class="section-header">
    <h2 class="section-title">Traffic Sources</h2>
  </div>
  <div class="utm-grid" id="utmGrid"></div>
</section>

<!-- ── Platform Cards ─────────────────────────────────────────────────── -->
<section class="platforms-section">
  <div class="section-header">
    <h2 class="section-title">Content Pipeline</h2>
    <div class="section-actions">
      <button class="btn btn-sm btn-outline" onclick="generateAllImages()">Generate All Images</button>
      <button class="btn btn-sm btn-outline" onclick="downloadReport()">Download Report</button>
    </div>
  </div>
  <div class="platforms-grid" id="platformsGrid">
    <!-- injected by JS -->
  </div>
</section>

<!-- ── Connection Status Panel ────────────────────────────────────────── -->
<section class="connections-section">
  <div class="section-header">
    <h2 class="section-title">Platform Connections</h2>
  </div>
  <div class="connections-grid" id="connectionsGrid">
    <!-- injected by JS -->
  </div>
</section>

<!-- ── Copy Modal ─────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="copyModal" onclick="closeCopyModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Copy</span>
      <button class="modal-close" onclick="closeCopyModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="copy-block" id="modalCopyTitle" style="display:none">
        <div class="copy-label">TITLE</div>
        <div class="copy-text" id="modalTitleText"></div>
        <button class="btn btn-xs btn-copy" onclick="copyText('modalTitleText')">Copy Title</button>
      </div>
      <div class="copy-block" id="modalCopyBody">
        <div class="copy-label">BODY / CAPTION</div>
        <div class="copy-text" id="modalBodyText"></div>
        <button class="btn btn-xs btn-copy" onclick="copyText('modalBodyText')">Copy Body</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm btn-outline" onclick="closeCopyModal()">Close</button>
    </div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
