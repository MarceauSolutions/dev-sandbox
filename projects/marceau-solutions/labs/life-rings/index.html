<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Life Rings</title>
  <link rel="manifest" href="manifest.json">
  <!-- v3 cache bust -->
  <style>
    :root {
      --gold: #C9963C;
      --gold-dim: rgba(201,150,60,0.12);
      --bg: #0a0a0a;
      --sf: #131313;
      --sf2: #1c1c1c;
      --sf3: #252525;
      --tx: #f0f0f0;
      --dim: #888;
      --mut: #555;
      --grn: #4ade80;
      --red: #f87171;
      --sab: env(safe-area-inset-bottom, 0px);
      --sat: env(safe-area-inset-top, 0px);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:calc(80px + var(--sab))}

    /* ── Topbar ── */
    .topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:calc(14px + var(--sat)) 20px 12px;display:flex;justify-content:space-between;align-items:flex-end}
    .topbar h1{font-size:26px;font-weight:900;color:var(--gold);letter-spacing:-0.5px}
    .topbar .sub{font-size:13px;color:var(--dim);margin-top:2px}
    .topbar .gear{background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer;padding:8px}

    /* ── Week Strip ── */
    .weekstrip{display:flex;gap:5px;padding:10px 20px 16px;overflow-x:auto;scrollbar-width:none}
    .weekstrip::-webkit-scrollbar{display:none}
    .daychip{width:46px;text-align:center;padding:10px 0 8px;border-radius:16px;cursor:pointer;background:var(--sf);transition:all 0.25s;flex-shrink:0}
    .daychip.active{background:var(--gold);transform:scale(1.05)}
    .daychip .dlabel{font-size:10px;color:var(--mut);text-transform:uppercase;font-weight:700;letter-spacing:0.5px}
    .daychip.active .dlabel{color:rgba(0,0,0,0.5)}
    .daychip .dnum{font-size:18px;font-weight:800;margin-top:3px}
    .daychip.active .dnum{color:#000}
    .daychip .ddot{width:6px;height:6px;border-radius:50%;margin:5px auto 0;background:transparent;transition:all 0.3s}
    .daychip.hasdata .ddot{background:var(--gold);box-shadow:0 0 6px var(--gold)}

    /* ── Main Rings ── */
    .rings-area{display:flex;justify-content:center;padding:4px 0 20px;position:relative}
    .rings-wrap{position:relative;width:300px;height:300px}
    .rings-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
    .ring-bg{fill:none;opacity:0.1}
    .ring-fg{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(0.34,1.56,0.64,1)}
    .ring-fg.glow{filter:drop-shadow(0 0 8px var(--glow-color))}
    .rings-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
    .rings-center .score{font-size:52px;font-weight:900;color:var(--gold);line-height:1;transition:transform 0.3s}
    .rings-center .score.bump{animation:scoreBump 0.4s ease}
    .rings-center .greeting{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-top:4px;font-weight:600}
    @keyframes scoreBump{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}

    /* ── Ring Cards ── */
    .ring-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 16px 20px}
    .ring-card{background:var(--sf);border-radius:20px;padding:18px 10px 14px;text-align:center;cursor:pointer;transition:all 0.25s;border:2px solid transparent;position:relative;overflow:hidden}
    .ring-card:active{transform:scale(0.95)}
    .ring-card.full{border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.05)}
    .ring-card .rc-ring{width:72px;height:72px;margin:0 auto 10px;position:relative}
    .ring-card .rc-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
    .ring-card .rc-ring .rc-bg{fill:none;opacity:0.25;stroke-width:7}
    .ring-card .rc-ring .rc-fg{fill:none;stroke-linecap:round;stroke-width:7;transition:stroke-dashoffset 1s cubic-bezier(0.34,1.56,0.64,1)}
    .ring-card .rc-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;font-weight:900}
    .ring-card .rc-name{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;font-weight:700;line-height:1.3}
    .ring-card .rc-glow{position:absolute;top:40%;left:50%;width:80px;height:80px;border-radius:50%;transform:translate(-50%,-50%);opacity:0;transition:opacity 0.5s;filter:blur(15px)}
    .ring-card.full .rc-glow{opacity:0.3}

    /* ── Streak ── */
    .streak{margin:0 16px 16px;padding:16px 18px;background:linear-gradient(135deg,rgba(201,150,60,0.14),rgba(201,150,60,0.04));border:1px solid rgba(201,150,60,0.2);border-radius:18px;display:flex;align-items:center;gap:14px}
    .streak .fire{font-size:36px;line-height:1}
    .streak h3{font-size:20px;font-weight:900;color:var(--gold)}
    .streak p{font-size:12px;color:var(--dim)}

    /* ── Check-in Buttons ── */
    .checkin-row{display:flex;gap:10px;padding:0 16px 16px}
    .checkin-btn{flex:1;padding:16px 12px;border-radius:16px;border:1px solid var(--sf3);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;text-align:center}
    .checkin-btn:active{transform:scale(0.97)}
    .checkin-btn.morning{background:var(--gold);color:#000;border-color:transparent}
    .checkin-btn.morning.done{background:rgba(74,222,128,0.08);color:var(--grn);border-color:rgba(74,222,128,0.2)}
    .checkin-btn.evening{background:var(--sf);color:var(--tx)}
    .checkin-btn.evening.done{background:rgba(74,222,128,0.08);color:var(--grn);border-color:rgba(74,222,128,0.2)}

    /* ── Section Headers ── */
    .section-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 20px 10px}
    .section-hdr h2{font-size:17px;font-weight:700}

    /* ── Habit Categories ── */
    .habit-cat{margin:0 16px 10px;background:var(--sf);border-radius:18px;overflow:hidden;transition:all 0.3s}
    .cat-header{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;-webkit-user-select:none;user-select:none}
    .cat-icon{font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0}
    .cat-info{flex:1}
    .cat-name{font-size:15px;font-weight:700}
    .cat-sub{font-size:11px;color:var(--dim);margin-top:1px}
    .cat-progress{width:48px;text-align:right}
    .cat-pct{font-size:16px;font-weight:900}
    .cat-bar{height:4px;margin:0 16px 14px;background:var(--sf3);border-radius:2px;overflow:hidden}
    .cat-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
    .cat-items{padding:0 8px 10px;overflow:hidden;transition:max-height 0.3s ease,opacity 0.3s;max-height:500px;opacity:1}
    .cat-items.collapsed{max-height:0;opacity:0;padding:0 8px}

    /* ── Habit Items ── */
    .habit{display:flex;align-items:center;gap:12px;padding:10px 10px;border-radius:14px;transition:all 0.2s;cursor:pointer;-webkit-user-select:none;user-select:none}
    .habit:active{background:rgba(255,255,255,0.03)}
    .habit-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:transform 0.3s}
    .habit-text{flex:1;min-width:0}
    .habit-name{font-size:14px;font-weight:600}
    .habit-detail{font-size:11px;color:var(--dim);margin-top:1px}

    /* ── Check Button (boolean habits) ── */
    .check-btn{width:40px;height:40px;border-radius:50%;border:2.5px solid var(--sf3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);background:transparent;position:relative;overflow:hidden}
    .check-btn svg{width:20px;height:20px;opacity:0;transform:scale(0);transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1)}
    .check-btn.on{border-color:var(--grn);background:var(--grn)}
    .check-btn.on svg{opacity:1;transform:scale(1)}
    .check-btn.on svg path{stroke:#000}
    .check-btn.pop{animation:checkPop 0.5s ease}
    @keyframes checkPop{0%{transform:scale(1)}30%{transform:scale(1.3)}50%{transform:scale(0.9)}100%{transform:scale(1)}}

    /* ── Counter Controls ── */
    .counter{display:flex;align-items:center;gap:6px}
    .counter-val{font-size:22px;font-weight:900;min-width:32px;text-align:center;transition:transform 0.2s}
    .counter-val.bump{animation:numBump 0.3s ease}
    @keyframes numBump{0%{transform:scale(1) translateY(0)}50%{transform:scale(1.2) translateY(-3px)}100%{transform:scale(1) translateY(0)}}
    .cnt-btn{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;cursor:pointer;transition:all 0.15s}
    .cnt-btn:active{transform:scale(0.85)}
    .cnt-btn.plus{background:var(--gold);color:#000}
    .cnt-btn.minus{background:var(--sf3);color:var(--dim)}

    /* ── Tasks ── */
    .tasks-area{padding:0 16px 16px}
    .task-input-row{display:flex;gap:8px;margin-bottom:12px}
    .task-input-row input[type=text]{flex:1;background:var(--sf);border:1.5px solid var(--sf3);border-radius:14px;padding:14px 16px;color:var(--tx);font-size:14px;outline:none;font-family:inherit;transition:border-color 0.2s}
    .task-input-row input:focus{border-color:var(--gold)}
    .task-input-row input::placeholder{color:var(--mut)}
    .task-input-row input[type=date]{background:var(--sf);border:1.5px solid var(--sf3);border-radius:14px;padding:12px 10px;color:var(--tx);font-size:12px;outline:none;width:115px}
    .task-add{background:var(--gold);color:#000;border:none;border-radius:14px;padding:0 20px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:transform 0.15s}
    .task-add:active{transform:scale(0.95)}

    .task-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--sf);border-radius:14px;margin-bottom:6px;transition:all 0.4s;overflow:hidden}
    .task-item.completing{transform:scale(0.97);opacity:0.6}
    .task-item.done{opacity:0.3}
    .task-check{width:26px;height:26px;border-radius:8px;border:2.5px solid var(--mut);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);background:transparent}
    .task-check svg{width:14px;height:14px;opacity:0;transform:scale(0);transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1)}
    .task-check svg path{stroke:#000;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .task-item.done .task-check{background:var(--gold);border-color:var(--gold)}
    .task-item.done .task-check svg{opacity:1;transform:scale(1)}
    .task-text{flex:1;font-size:14px;transition:all 0.3s}
    .task-item.done .task-text{text-decoration:line-through;color:var(--mut)}
    .task-due{font-size:11px;color:var(--mut);white-space:nowrap}
    .task-due.overdue{color:var(--red);font-weight:600}
    .task-del{font-size:18px;color:var(--mut);cursor:pointer;padding:4px;opacity:0.5;transition:opacity 0.2s}
    .task-del:active{opacity:1}

    /* ── Particles (completion celebration) ── */
    .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
    .particle{position:absolute;width:8px;height:8px;border-radius:50%;animation:particleFly 0.8s ease-out forwards}
    @keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

    /* ── Journal ── */
    .journal{margin:0 16px 16px;padding:16px;background:var(--sf);border-radius:18px}
    .journal h3{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--gold)}
    .journal pre{font-size:13px;color:var(--dim);line-height:1.6;white-space:pre-wrap;font-family:inherit}

    /* ── Weekly View ── */
    .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:0 16px}
    .week-day{text-align:center;padding:10px 0}
    .week-day .wlbl{font-size:10px;color:var(--mut);text-transform:uppercase;font-weight:700}
    .week-day .wring{width:40px;height:40px;margin:8px auto}
    .week-day .wring svg{width:100%;height:100%;transform:rotate(-90deg)}
    .week-day .wscore{font-size:12px;font-weight:800;color:var(--dim)}
    .breakdown{padding:0 16px 16px}
    .brow{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--sf);border-radius:14px;margin-bottom:8px}
    .brow .bdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
    .brow .bname{flex:1;font-size:14px;font-weight:600}
    .brow .bbar{flex:2;background:var(--sf3);height:10px;border-radius:5px;overflow:hidden}
    .brow .bfill{height:100%;border-radius:5px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
    .brow .bpct{font-size:15px;font-weight:900;min-width:44px;text-align:right}
    .leaderboard{padding:0 16px 16px}
    .lb-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--sf);border-radius:12px;margin-bottom:6px}
    .lb-item .lb-rank{font-size:14px;font-weight:900;color:var(--gold);width:24px}
    .lb-item .lb-icon{font-size:18px}
    .lb-item .lb-name{flex:1;font-size:13px;font-weight:600}
    .lb-item .lb-pct{font-size:14px;font-weight:900}

    /* ── History ── */
    .hist-entry{margin:0 16px 10px;padding:16px;background:var(--sf);border-radius:16px}
    .hist-entry .hdate{font-size:13px;color:var(--gold);font-weight:700;margin-bottom:8px}
    .hist-entry .hbadges{display:flex;gap:6px;flex-wrap:wrap}
    .hist-entry .hbadge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .hist-entry .hbdot{width:6px;height:6px;border-radius:50%}
    .empty{padding:60px 20px;text-align:center;color:var(--mut);font-size:14px}

    /* ── Modals ── */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:none;justify-content:center;align-items:flex-end}
    .modal.open{display:flex}
    .modal-panel{background:var(--sf);border-radius:24px 24px 0 0;padding:20px 20px calc(24px + var(--sab));width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
    .modal-handle{width:40px;height:5px;background:var(--mut);border-radius:3px;margin:0 auto 18px}
    .modal-panel h2{font-size:22px;font-weight:900;margin-bottom:4px}
    .modal-panel .modal-sub{font-size:13px;color:var(--dim);margin-bottom:18px}
    .mfield{margin-bottom:14px}
    .mfield label{font-size:13px;font-weight:600;display:block;margin-bottom:6px;color:var(--dim)}
    .mfield textarea,.mfield input[type=text]{width:100%;background:var(--sf2);border:1.5px solid var(--sf3);border-radius:14px;padding:14px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;resize:vertical;transition:border-color 0.2s}
    .mfield textarea:focus,.mfield input:focus{border-color:var(--gold)}
    .mfield textarea{min-height:70px}
    .modal-submit{width:100%;padding:16px;background:var(--gold);color:#000;border:none;border-radius:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:10px;transition:transform 0.15s}
    .modal-submit:active{transform:scale(0.97)}

    /* Settings */
    .settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;justify-content:center;align-items:flex-end}
    .settings-overlay.open{display:flex}
    .settings-panel{background:var(--sf);border-radius:24px 24px 0 0;padding:20px 20px calc(24px + var(--sab));width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
    .srow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--sf3)}
    .srow label{font-size:14px}
    .srow input[type=number]{width:64px;background:var(--sf3);border:none;border-radius:10px;padding:10px;text-align:center;color:var(--tx);font-size:16px;font-weight:700}
    .gym-chips{display:flex;gap:6px}
    .gym-chip{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--sf3);color:var(--dim);cursor:pointer;transition:all 0.2s}
    .gym-chip.sel{background:var(--gold);color:#000}
    .xbtn{width:100%;padding:14px;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;background:var(--sf3);color:var(--tx)}

    /* ── Bottom Nav ── */
    .bottomnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--sf3);display:flex;justify-content:space-around;padding:10px 0 calc(10px + var(--sab));z-index:100}
    .nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 20px;cursor:pointer;color:var(--mut);background:none;border:none;font-family:inherit;transition:color 0.2s}
    .nav-btn.active{color:var(--gold)}
    .nav-btn .nav-icon{font-size:24px}
    .nav-btn .nav-label{font-size:10px;font-weight:600}

    .view{display:none}.view.active{display:block}

    /* ── EOD top3 items ── */
    .eod-priority{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--sf2);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:all 0.2s}
    .eod-priority:active{background:var(--sf3)}
    .eod-priority.hit{background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.15)}
    .eod-check{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--mut);display:flex;align-items:center;justify-content:center;transition:all 0.3s;flex-shrink:0}
    .eod-priority.hit .eod-check{background:var(--grn);border-color:var(--grn)}
    .eod-check svg{width:14px;height:14px;opacity:0;transition:all 0.3s}
    .eod-priority.hit .eod-check svg{opacity:1}
    .eod-check svg path{stroke:#000;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .eod-text{flex:1;font-size:14px}
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<!-- ══════ TODAY ══════ -->
<div id="v-today" class="view active">
  <div class="topbar">
    <div><h1>Life Rings</h1><div class="sub" id="h-date"></div></div>
    <button class="gear" onclick="openSettings()">&#9881;&#65039;</button>
  </div>
  <div class="weekstrip" id="weekstrip"></div>
  <div class="rings-area">
    <div class="rings-wrap">
      <svg viewBox="0 0 300 300" id="mainrings"></svg>
      <div class="rings-center"><div class="score" id="mainscore">0%</div><div class="greeting" id="greeting">Today</div></div>
    </div>
  </div>
  <div class="ring-cards" id="ringcards"></div>
  <div class="streak" id="streakbar" style="display:none">
    <div class="fire">&#128293;</div>
    <div><h3 id="streaknum"></h3><p id="streakmsg"></p></div>
  </div>
  <div class="checkin-row" id="checkinrow"></div>
  <div id="habits"></div>
  <div class="section-hdr" style="margin-top:4px"><h2>Tasks & Commitments</h2></div>
  <div class="tasks-area">
    <div class="task-input-row">
      <input type="text" id="taskinput" placeholder="What needs to get done?">
      <input type="date" id="taskdate">
      <button class="task-add" onclick="addTask()">Add</button>
    </div>
    <div id="tasklist"></div>
  </div>
  <div id="journalsec"></div>
</div>

<!-- ══════ WEEKLY ══════ -->
<div id="v-weekly" class="view">
  <div class="topbar"><h1>Weekly</h1><div class="sub" id="weekrange"></div></div>
  <div style="padding-top:12px">
    <div class="week-grid" id="weekgrid"></div>
    <div class="section-hdr" style="margin-top:20px"><h2>Ring Breakdown</h2></div>
    <div class="breakdown" id="weekbreak"></div>
    <div class="section-hdr"><h2>Habits Leaderboard</h2></div>
    <div class="leaderboard" id="leaderboard"></div>
  </div>
</div>

<!-- ══════ HISTORY ══════ -->
<div id="v-history" class="view">
  <div class="topbar"><h1>History</h1></div>
  <div id="histlist" style="padding-top:12px"></div>
</div>

<!-- ══════ NAV ══════ -->

<script>
// ═════════════════════════════════════════
// CATEGORIES — The Builder's Operating System
// ═════════════════════════════════════════

const CATS=[
  {id:'morning',name:'Morning Protocol',icon:'\u{1F305}',color:'#C9963C',desc:'Win the morning, win the day',
   habits:[
    {id:'wake_ontime',name:'Woke On Schedule',type:'bool',icon:'\u{23F0}'},
    {id:'morning_checkin',name:'Morning Check-In Done',type:'bool',icon:'\u{1F4DD}'},
    {id:'study_block',name:'Study / Learning Block',type:'bool',icon:'\u{1F4DA}'},
    {id:'plan_written',name:'Daily Plan Written',type:'bool',icon:'\u{1F3AF}'},
    {id:'no_phone_1hr',name:'No Phone First Hour',type:'bool',icon:'\u{1F6AB}'},
  ]},
  {id:'execution',name:'Business Execution',icon:'\u{1F4BC}',color:'#60a5fa',desc:'Revenue-generating activities',
   habits:[
    {id:'emails_sent',name:'Emails Sent',type:'counter',icon:'\u{2709}\uFE0F',tgt:10},
    {id:'calls_made',name:'Calls Made',type:'counter',icon:'\u{1F4F1}',tgt:10},
    {id:'proposals_sent',name:'Proposals Sent',type:'counter',icon:'\u{1F4C4}',tgt:2},
    {id:'content_created',name:'Content Created',type:'counter',icon:'\u{1F3AC}',tgt:1},
    {id:'focus_blocks',name:'Deep Work (90min blocks)',type:'counter',icon:'\u{1F9E0}',tgt:2},
  ]},
  {id:'followup',name:'Follow-Up & Close',icon:'\u{1F91D}',color:'#a78bfa',desc:'Pipeline progression',
   habits:[
    {id:'emails_responded',name:'Emails Responded',type:'counter',icon:'\u{1F4AC}',tgt:5},
    {id:'callbacks',name:'Callbacks Made',type:'counter',icon:'\u{1F4DE}',tgt:3},
    {id:'clients_closed',name:'Clients Closed',type:'counter',icon:'\u{1F4B0}',tgt:1},
    {id:'meetings_booked',name:'Meetings Booked',type:'counter',icon:'\u{1F4C5}',tgt:2},
  ]},
  {id:'fitness',name:'Fitness & Health',icon:'\u{1F4AA}',color:'#4ade80',desc:'The body is the business vehicle',
   habits:[
    {id:'gym',name:'Gym \u2014 Showed Up',type:'bool',icon:'\u{1F3CB}\uFE0F',gymOnly:true},
    {id:'training',name:'Training Logged',type:'bool',icon:'\u{1F4AA}',gymOnly:true},
    {id:'nutrition',name:'Nutrition On Plan',type:'bool',icon:'\u{1F957}'},
    {id:'water',name:'Water (glasses)',type:'counter',icon:'\u{1F4A7}',tgt:8},
    {id:'steps',name:'Steps (thousands)',type:'counter',icon:'\u{1F6B6}',tgt:10},
  ]},
  {id:'discipline',name:'Discipline & Growth',icon:'\u{1F9D8}',color:'#fb923c',desc:'What separates builders from dreamers',
   habits:[
    {id:'read_30',name:'Read 30+ Minutes',type:'bool',icon:'\u{1F4D6}'},
    {id:'no_scroll',name:'No Social Scrolling',type:'bool',icon:'\u{1F645}'},
    {id:'journal',name:'Journaled',type:'bool',icon:'\u270D\uFE0F'},
    {id:'gratitude',name:'Gratitude Logged',type:'bool',icon:'\u{1F64F}'},
    {id:'skill_practice',name:'Skill Practice',type:'bool',icon:'\u{1F527}'},
  ]},
  {id:'evening',name:'Evening Protocol',icon:'\u{1F319}',color:'#22d3ee',desc:'Close the loop, set up tomorrow',
   habits:[
    {id:'eod_review',name:'EOD Review Done',type:'bool',icon:'\u{1F4CB}'},
    {id:'tmrw_planned',name:'Tomorrow Planned',type:'bool',icon:'\u{1F4C6}'},
    {id:'wins_logged',name:'Wins Journaled',type:'bool',icon:'\u{1F3C6}'},
    {id:'lessons_logged',name:'Lessons Captured',type:'bool',icon:'\u{1F4A1}'},
    {id:'screen_off',name:'Screens Off by 10pm',type:'bool',icon:'\u{1F4F5}'},
  ]},
];

// ═════════════════════════════════════════
// STORAGE
// ═════════════════════════════════════════
const PFX='lr3_';
const J=JSON.parse,S=JSON.stringify;
const load=k=>{try{return J(localStorage.getItem(PFX+k)||'{}');}catch{return{};}};
const save=(k,v)=>localStorage.setItem(PFX+k,S(v));
const loadA=k=>{try{return J(localStorage.getItem(PFX+k)||'[]');}catch{return[];}};
const saveA=(k,v)=>localStorage.setItem(PFX+k,S(v));

function dk(d){const dt=d||new Date();return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function gDay(k){return load('days')[k]||{};}
function sDay(k,data){const s=load('days');s[k]={...(s[k]||{}),...data};save('days',s);}
function gTgt(hid){const t=load('tgts');for(const c of CATS)for(const h of c.habits)if(h.id===hid)return t[hid]??h.tgt??1;return 1;}
function sTgt(hid,v){const t=load('tgts');t[hid]=v;save('tgts',t);}
function gGym(){try{return J(localStorage.getItem(PFX+'gym')||'[1,2,3,4,5]');}catch{return[1,2,3,4,5];}}
function sGym(d){localStorage.setItem(PFX+'gym',S(d));}
function gTasks(){return loadA('tasks');}
function sTasks(t){saveA('tasks',t);}
function gJournal(k){return load('journal')[k]||{};}
function sJournal(k,d){const s=load('journal');s[k]={...(s[k]||{}),...d};save('journal',s);}
function gCollapsed(){try{return J(localStorage.getItem(PFX+'col')||'{}');}catch{return{};}}
function sCollapsed(c){localStorage.setItem(PFX+'col',S(c));}

// ═════════════════════════════════════════
// CALCULATIONS
// ═════════════════════════════════════════
function catProg(catId,key){
  const cat=CATS.find(c=>c.id===catId),data=gDay(key),gym=gGym(),dow=new Date(key+'T12:00:00').getDay();
  const active=cat.habits.filter(h=>!(h.gymOnly&&!gym.includes(dow)));
  if(!active.length)return 0;
  let sum=0;
  active.forEach(h=>{
    if(h.type==='bool')sum+=data[h.id]?1:0;
    else{const tgt=gTgt(h.id);sum+=Math.min((data[h.id]||0)/tgt,1);}
  });
  return sum/active.length;
}
function dayScore(key){
  const gym=gGym(),dow=new Date(key+'T12:00:00').getDay();
  let sum=0,cnt=0;
  CATS.forEach(c=>{
    const active=c.habits.filter(h=>!(h.gymOnly&&!gym.includes(dow)));
    if(!active.length)return;sum+=catProg(c.id,key);cnt++;
  });
  return cnt?Math.round((sum/cnt)*100):0;
}
function getStreak(){
  let streak=0;const today=dk();
  if(dayScore(today)>=70)streak=1;
  const d=new Date();d.setDate(d.getDate()-1);
  while(dayScore(dk(d))>=70){streak++;d.setDate(d.getDate()-1);if(streak>365)break;}
  return streak;
}

// ═════════════════════════════════════════
// STATE
// ═════════════════════════════════════════
let sel=new Date(),view='today';

// ═════════════════════════════════════════
// HAPTICS & PARTICLES
// ═════════════════════════════════════════
function haptic(){if(navigator.vibrate)navigator.vibrate(15);}

function burst(x,y,color,count=12){
  const container=document.getElementById('particles');
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*Math.PI*2;
    const dist=40+Math.random()*60;
    p.style.cssText=`left:${x}px;top:${y}px;background:${color};width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px`;
    container.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

const checkSVG='<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>';

// ═════════════════════════════════════════
// RENDER
// ═════════════════════════════════════════
function fmt(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});}
function fmtS(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function render(){
  document.getElementById('h-date').textContent=fmt(sel);
  const hr=new Date().getHours();
  document.getElementById('greeting').textContent=dk(sel)===dk()?(hr<12?'Good Morning':hr<17?'Afternoon':'Evening'):'Score';
  if(view==='today'){rStrip();rMainRings();rRingCards();rStreak();rCheckins();rHabits();rTasks();rJournal();}
  else if(view==='weekly')rWeekly();
  else rHistory();
}

function rStrip(){
  const el=document.getElementById('weekstrip');el.innerHTML='';
  const today=new Date(),sow=new Date(today);sow.setDate(today.getDate()-today.getDay());
  const dn=['S','M','T','W','T','F','S'];
  for(let i=0;i<7;i++){
    const d=new Date(sow);d.setDate(sow.getDate()+i);
    const key=dk(d),isA=dk(sel)===key,has=dayScore(key)>0;
    const c=document.createElement('div');
    c.className='daychip'+(isA?' active':'')+(has?' hasdata':'');
    c.innerHTML=`<div class="dlabel">${dn[i]}</div><div class="dnum">${d.getDate()}</div><div class="ddot"></div>`;
    c.onclick=()=>{sel=new Date(d);render();};
    el.appendChild(c);
  }
}

function rMainRings(){
  const svg=document.getElementById('mainrings'),key=dk(sel);svg.innerHTML='';
  const cx=150,cy=150;
  CATS.forEach((c,i)=>{
    const rad=140-i*22,sw=16,circ=2*Math.PI*rad,prog=catProg(c.id,key);
    const bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
    bg.setAttribute('cx',cx);bg.setAttribute('cy',cy);bg.setAttribute('r',rad);
    bg.setAttribute('stroke',c.color);bg.setAttribute('stroke-width',sw);bg.classList.add('ring-bg');svg.appendChild(bg);
    const fg=document.createElementNS('http://www.w3.org/2000/svg','circle');
    fg.setAttribute('cx',cx);fg.setAttribute('cy',cy);fg.setAttribute('r',rad);
    fg.setAttribute('stroke',c.color);fg.setAttribute('stroke-width',sw);fg.classList.add('ring-fg');
    fg.setAttribute('stroke-dasharray',circ);fg.setAttribute('stroke-dashoffset',circ);
    if(prog>=1){fg.classList.add('glow');fg.style.setProperty('--glow-color',c.color);}
    svg.appendChild(fg);
    requestAnimationFrame(()=>{fg.style.strokeDashoffset=circ*(1-prog);});
  });
  const score=dayScore(key),el=document.getElementById('mainscore');
  el.textContent=score+'%';
  el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');
}

function rRingCards(){
  const el=document.getElementById('ringcards'),key=dk(sel);el.innerHTML='';
  CATS.forEach(c=>{
    const pct=Math.round(catProg(c.id,key)*100);
    const r=28,circ=2*Math.PI*r,offset=circ*(1-(pct/100));
    const full=pct>=100;
    const d=document.createElement('div');
    d.className='ring-card'+(full?' full':'');
    d.innerHTML=`
      <div class="rc-glow" style="background:${c.color}"></div>
      <div class="rc-ring">
        <svg viewBox="0 0 72 72">
          <circle cx="36" cy="36" r="${r}" class="rc-bg" stroke="${c.color}"/>
          <circle cx="36" cy="36" r="${r}" class="rc-fg" stroke="${c.color}"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            ${full?`style="filter:drop-shadow(0 0 8px ${c.color})"`:''}/>
        </svg>
        <div class="rc-pct" style="color:${c.color}">${pct}%</div>
      </div>
      <div class="rc-name">${c.name}</div>`;
    el.appendChild(d);
    requestAnimationFrame(()=>{const fg=d.querySelector('.rc-fg');if(fg)fg.style.strokeDashoffset=offset;});
  });
}

function rStreak(){
  const streak=getStreak(),bar=document.getElementById('streakbar');
  if(streak>0){
    bar.style.display='flex';
    document.getElementById('streaknum').textContent=streak+' Day Streak';
    const msgs=['Keep closing those rings!','Consistency compounds.','Embrace the pain, defy the odds.',
      'Show up. Do the work. Repeat.','Discipline = Freedom.','Outwork yesterday.','Builder mode: engaged.'];
    document.getElementById('streakmsg').textContent=msgs[streak%msgs.length];
  }else bar.style.display='none';
}

function rCheckins(){
  const el=document.getElementById('checkinrow'),key=dk(sel),jour=gJournal(key);el.innerHTML='';
  const mDone=jour.morning_done,eDone=jour.eod_done;
  el.innerHTML=`
    <button class="checkin-btn morning${mDone?' done':''}" onclick="openMorning()">
      ${mDone?'\u2713 Morning Done':'\u{1F305} Morning Check-In'}
    </button>
    <button class="checkin-btn evening${eDone?' done':''}" onclick="openEOD()">
      ${eDone?'\u2713 Day Closed':'\u{1F319} End of Day'}
    </button>`;
}

function rHabits(){
  const el=document.getElementById('habits'),key=dk(sel),data=gDay(key);el.innerHTML='';
  const gym=gGym(),dow=sel.getDay(),collapsed=gCollapsed();
  CATS.forEach(cat=>{
    const active=cat.habits.filter(h=>!(h.gymOnly&&!gym.includes(dow)));
    if(!active.length)return;
    const pct=Math.round(catProg(cat.id,key)*100);
    const isCol=collapsed[cat.id];
    const div=document.createElement('div');div.className='habit-cat';
    let html=`<div class="cat-header" onclick="toggleCat('${cat.id}')">
      <div class="cat-icon" style="background:${cat.color}1a;color:${cat.color}">${cat.icon}</div>
      <div class="cat-info"><div class="cat-name">${cat.name}</div><div class="cat-sub">${cat.desc}</div></div>
      <div class="cat-progress"><div class="cat-pct" style="color:${cat.color}">${pct}%</div></div>
    </div>
    <div class="cat-bar"><div class="cat-fill" style="width:${pct}%;background:${cat.color}"></div></div>
    <div class="cat-items${isCol?' collapsed':''}">`;
    active.forEach(h=>{
      if(h.type==='bool'){
        const on=!!data[h.id];
        html+=`<div class="habit" onclick="toggleHabit(event,'${h.id}','${cat.color}')">
          <div class="habit-icon" style="background:${cat.color}1a">${h.icon}</div>
          <div class="habit-text"><div class="habit-name">${h.name}</div></div>
          <div class="check-btn${on?' on':''}" data-hid="${h.id}">${checkSVG}</div>
        </div>`;
      }else{
        const val=data[h.id]||0,tgt=gTgt(h.id),pctH=Math.min(Math.round(val/tgt*100),100);
        html+=`<div class="habit">
          <div class="habit-icon" style="background:${cat.color}1a">${h.icon}</div>
          <div class="habit-text"><div class="habit-name">${h.name}</div><div class="habit-detail">${val} / ${tgt} (${pctH}%)</div></div>
          <div class="counter">
            <button class="cnt-btn minus" onclick="adjHabit(event,'${h.id}',-1,'${cat.color}')">-</button>
            <span class="counter-val" style="color:${cat.color}" data-hid="${h.id}">${val}</span>
            <button class="cnt-btn plus" onclick="adjHabit(event,'${h.id}',1,'${cat.color}')">+</button>
          </div>
        </div>`;
      }
    });
    html+='</div>';
    div.innerHTML=html;
    el.appendChild(div);
  });
}

function rTasks(){
  const key=dk(sel),tasks=gTasks(),today=dk(),list=document.getElementById('tasklist');list.innerHTML='';
  const rel=tasks.filter(t=>t.due===key||(t.due<today&&!t.done));
  rel.sort((a,b)=>(a.done?1:0)-(b.done?1:0));
  if(!rel.length){list.innerHTML='<div style="padding:16px;text-align:center;color:var(--mut);font-size:13px">No tasks yet. Add one above.</div>';document.getElementById('taskdate').value=key;return;}
  rel.forEach(t=>{
    const idx=tasks.indexOf(t),od=t.due<today&&!t.done;
    const d=document.createElement('div');d.className='task-item'+(t.done?' done':'');d.setAttribute('data-idx',idx);
    d.innerHTML=`<div class="task-check" onclick="toggleTask(event,${idx})">${checkSVG}</div>
      <div class="task-text">${esc(t.text)}</div>
      <div class="task-due${od?' overdue':''}">${od?'OVERDUE':fmtS(new Date(t.due+'T12:00:00'))}</div>
      <div class="task-del" onclick="delTask(${idx})">&times;</div>`;
    list.appendChild(d);
  });
  document.getElementById('taskdate').value=key;
}

function rJournal(){
  const el=document.getElementById('journalsec'),key=dk(sel),jour=gJournal(key);el.innerHTML='';
  const entries=[];
  if(jour.morning_done){
    entries.push(`Wake: ${jour.wake||'-'} | Energy: ${jour.energy||'-'}/10\nTop 3: ${jour.top3||'-'}\nWin condition: ${jour.win_cond||'-'}\nGrateful for: ${jour.gratitude||'-'}`);
  }
  if(jour.eod_done){
    entries.push(`Day rating: ${jour.day_rate||'-'}/10 | Sleep: ${jour.sleep||'-'}h\nBiggest win: ${jour.biggest_win||'-'}\nLesson: ${jour.lesson||'-'}\nTomorrow #1: ${jour.tmrw_priority||'-'}`);
  }
  if(entries.length){
    const div=document.createElement('div');div.className='journal';
    div.innerHTML=`<h3>Journal</h3><pre>${entries.join('\n\n')}</pre>`;
    el.appendChild(div);
  }
}

// ═════════════════════════════════════════
// ACTIONS — with delight
// ═════════════════════════════════════════
function toggleHabit(e,id,color){
  e.stopPropagation();
  const key=dk(sel),data=gDay(key),newVal=!data[id];
  sDay(key,{[id]:newVal});
  haptic();
  const btn=e.currentTarget.querySelector('.check-btn')||e.currentTarget;
  if(newVal){
    btn.classList.add('on','pop');
    const rect=btn.getBoundingClientRect();
    burst(rect.left+rect.width/2,rect.top+rect.height/2,color,8);
    setTimeout(()=>btn.classList.remove('pop'),500);
  }else{
    btn.classList.remove('on');
  }
  // Re-render after a brief delay so animation plays
  setTimeout(()=>render(),newVal?400:100);
}

function adjHabit(e,id,delta,color){
  e.stopPropagation();
  const key=dk(sel),data=gDay(key),newVal=Math.max(0,(data[id]||0)+delta);
  sDay(key,{[id]:newVal});
  haptic();
  if(delta>0){
    const valEl=document.querySelector(`.counter-val[data-hid="${id}"]`);
    if(valEl){valEl.classList.remove('bump');void valEl.offsetWidth;valEl.classList.add('bump');}
    const tgt=gTgt(id);
    if(newVal>=tgt&&(newVal-delta)<tgt){
      const rect=e.currentTarget.getBoundingClientRect();
      burst(rect.left+rect.width/2,rect.top+rect.height/2,color,15);
    }
  }
  setTimeout(()=>render(),200);
}

function toggleCat(id){const c=gCollapsed();c[id]=!c[id];sCollapsed(c);render();}

function addTask(){
  const inp=document.getElementById('taskinput'),dt=document.getElementById('taskdate');
  const text=inp.value.trim();if(!text)return;
  const tasks=gTasks();tasks.push({text,due:dt.value||dk(sel),done:false,created:dk()});
  sTasks(tasks);inp.value='';haptic();render();
}

function toggleTask(e,idx){
  e.stopPropagation();
  const tasks=gTasks(),wasDone=tasks[idx].done;
  tasks[idx].done=!wasDone;
  if(!wasDone){
    tasks[idx].completedOn=dk();
    haptic();
    const item=e.currentTarget.closest('.task-item');
    if(item){
      item.classList.add('completing');
      const rect=e.currentTarget.getBoundingClientRect();
      burst(rect.left+rect.width/2,rect.top+rect.height/2,'var(--gold)',10);
    }
    sTasks(tasks);
    setTimeout(()=>render(),500);
  }else{
    sTasks(tasks);render();
  }
}

function delTask(idx){const t=gTasks();t.splice(idx,1);sTasks(t);render();}

// ═════════════════════════════════════════
// CHECK-INS
// ═════════════════════════════════════════
function openMorning(){
  const key=dk(sel),jour=gJournal(key);
  document.getElementById('m-wake').value=jour.wake||'';
  document.getElementById('m-top3').value=jour.top3||'';
  document.getElementById('m-win').value=jour.win_cond||'';
  document.getElementById('m-grat').value=jour.gratitude||'';
  document.getElementById('m-energy').value=jour.energy||'';
  document.getElementById('modal-morning').classList.add('open');
}
function saveMorning(){
  const key=dk(sel);
  sJournal(key,{
    morning_done:true,wake:document.getElementById('m-wake').value,
    top3:document.getElementById('m-top3').value,win_cond:document.getElementById('m-win').value,
    gratitude:document.getElementById('m-grat').value,energy:document.getElementById('m-energy').value
  });
  sDay(key,{morning_checkin:true,plan_written:true,gratitude:true});
  haptic();burst(window.innerWidth/2,window.innerHeight/2,'#C9963C',20);
  document.getElementById('modal-morning').classList.remove('open');
  render();
}

function openEOD(){
  const key=dk(sel),jour=gJournal(key);
  const sec=document.getElementById('eod-top3-section');sec.innerHTML='';
  const morningTop3=jour.top3||'';
  if(morningTop3){
    const lines=morningTop3.split('\n').filter(l=>l.trim());
    let html='<div class="mfield"><label>Did you hit your Top 3?</label>';
    lines.forEach((l,i)=>{
      const clean=l.replace(/^\d+[\.\)]\s*/,'').trim();
      const hit=jour['top3_hit_'+i];
      html+=`<div class="eod-priority${hit?' hit':''}" onclick="this.classList.toggle('hit')" data-idx="${i}">
        <div class="eod-check">${checkSVG}</div>
        <div class="eod-text">${esc(clean)}</div>
      </div>`;
    });
    html+='</div>';sec.innerHTML=html;
  }else{
    sec.innerHTML='<div class="mfield"><label>Top 3 Results</label><textarea id="e-top3-fb" placeholder="How did your priorities go?"></textarea></div>';
  }
  document.getElementById('e-win').value=jour.biggest_win||'';
  document.getElementById('e-lesson').value=jour.lesson||'';
  document.getElementById('e-tmrw').value=jour.tmrw_priority||'';
  document.getElementById('e-sleep').value=jour.sleep||'';
  document.getElementById('e-rate').value=jour.day_rate||'';
  document.getElementById('modal-eod').classList.add('open');
}
function saveEOD(){
  const key=dk(sel);
  const top3Data={};
  document.querySelectorAll('#eod-top3-section .eod-priority').forEach((el,i)=>{
    top3Data['top3_hit_'+i]=el.classList.contains('hit');
  });
  const fb=document.getElementById('e-top3-fb');
  sJournal(key,{
    eod_done:true,...top3Data,
    top3_results:fb?fb.value:'',

    tmrw_priority:document.getElementById('e-tmrw').value,
    sleep:document.getElementById('e-sleep').value,
    day_rate:document.getElementById('e-rate').value
  });
  sDay(key,{eod_review:true,tmrw_planned:true,wins_logged:true,lessons_logged:true,journal:true});
  haptic();burst(window.innerWidth/2,window.innerHeight/2,'#22d3ee',20);
  document.getElementById('modal-eod').classList.remove('open');
  render();
}

// ═════════════════════════════════════════
// WEEKLY
// ═════════════════════════════════════════
function rWeekly(){
  const grid=document.getElementById('weekgrid'),brk=document.getElementById('weekbreak'),lb=document.getElementById('leaderboard');
  grid.innerHTML='';brk.innerHTML='';lb.innerHTML='';
  const today=new Date(),sow=new Date(today);sow.setDate(today.getDate()-today.getDay());
  const eow=new Date(sow);eow.setDate(sow.getDate()+6);
  document.getElementById('weekrange').textContent=fmtS(sow)+' \u2014 '+fmtS(eow);
  const dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for(let i=0;i<7;i++){
    const d=new Date(sow);d.setDate(sow.getDate()+i);const key=dk(d),sc=dayScore(key),circ=2*Math.PI*14;
    const el=document.createElement('div');el.className='week-day';
    el.innerHTML=`<div class="wlbl">${dn[i]}</div>
      <div class="wring"><svg viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="14" fill="none" stroke="${sc>0?'var(--gold)':'var(--sf3)'}" stroke-width="4" opacity="${sc>0?'0.15':'1'}" style="transform:rotate(-90deg);transform-origin:center"/>
        <circle cx="20" cy="20" r="14" fill="none" stroke="var(--gold)" stroke-width="4" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-sc/100)}" style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 0.6s"/>
      </svg></div><div class="wscore">${sc}%</div>`;
    grid.appendChild(el);
  }
  CATS.forEach(c=>{
    let wt=0,wp=0;
    for(let i=0;i<7;i++){const d=new Date(sow);d.setDate(sow.getDate()+i);const key=dk(d),gym=gGym(),active=c.habits.filter(h=>!(h.gymOnly&&!gym.includes(d.getDay())));if(!active.length)continue;wt+=catProg(c.id,key);wp++;}
    const pct=wp?Math.round((wt/wp)*100):0;
    const el=document.createElement('div');el.className='brow';
    el.innerHTML=`<div class="bdot" style="background:${c.color}"></div><div class="bname">${c.name}</div><div class="bbar"><div class="bfill" style="width:${pct}%;background:${c.color}"></div></div><div class="bpct" style="color:${c.color}">${pct}%</div>`;
    brk.appendChild(el);
  });
  const scores=[];
  CATS.forEach(c=>{c.habits.forEach(h=>{
    let hits=0,possible=0;
    for(let i=0;i<7;i++){const d=new Date(sow);d.setDate(sow.getDate()+i);const key=dk(d),data=gDay(key),gym=gGym();if(h.gymOnly&&!gym.includes(d.getDay()))continue;possible++;if(h.type==='bool')hits+=data[h.id]?1:0;else hits+=Math.min((data[h.id]||0)/gTgt(h.id),1);}
    if(possible)scores.push({name:h.name,icon:h.icon,color:c.color,pct:Math.round((hits/possible)*100)});
  });});
  scores.sort((a,b)=>b.pct-a.pct);
  scores.slice(0,10).forEach((h,i)=>{
    const el=document.createElement('div');el.className='lb-item';
    el.innerHTML=`<span class="lb-rank">${i+1}</span><span class="lb-icon">${h.icon}</span><span class="lb-name">${h.name}</span><span class="lb-pct" style="color:${h.color}">${h.pct}%</span>`;
    lb.appendChild(el);
  });
}

// ═════════════════════════════════════════
// HISTORY
// ═════════════════════════════════════════
function rHistory(){
  const list=document.getElementById('histlist');list.innerHTML='';
  const store=load('days'),keys=Object.keys(store).sort().reverse().slice(0,30);
  if(!keys.length){list.innerHTML='<div class="empty">No data yet. Start building!</div>';return;}
  keys.forEach(key=>{
    const sc=dayScore(key);if(!sc)return;
    const d=new Date(key+'T12:00:00'),jour=gJournal(key);
    const el=document.createElement('div');el.className='hist-entry';
    let extra='';if(jour.day_rate)extra=` | Rated ${jour.day_rate}/10`;
    el.innerHTML=`<div class="hdate">${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} \u2014 ${sc}%${extra}</div>
      <div class="hbadges">${CATS.map(c=>{const p=Math.round(catProg(c.id,key)*100);return p?`<div class="hbadge" style="background:${c.color}1a;color:${c.color}"><div class="hbdot" style="background:${c.color}"></div>${c.name} ${p}%</div>`:'';}).join('')}</div>`;
    list.appendChild(el);
  });
}

// ═════════════════════════════════════════
// SETTINGS
// ═════════════════════════════════════════
function openSettings(){
  const body=document.getElementById('settings-body');body.innerHTML='';
  const gym=gGym(),dn=['S','M','T','W','T','F','S'];
  const gd=document.createElement('div');gd.style.cssText='padding:14px 0;border-bottom:1px solid var(--sf3)';
  gd.innerHTML=`<label style="font-size:14px;display:block;margin-bottom:8px">Gym Days</label><div class="gym-chips">${dn.map((d,i)=>`<div class="gym-chip${gym.includes(i)?' sel':''}" onclick="togGD(${i})">${d}</div>`).join('')}</div>`;
  body.appendChild(gd);
  CATS.forEach(c=>{c.habits.filter(h=>h.type==='counter').forEach(h=>{
    const row=document.createElement('div');row.className='srow';
    row.innerHTML=`<label>${h.icon} ${h.name}</label><input type="number" value="${gTgt(h.id)}" min="1" onchange="sTgt('${h.id}',parseInt(this.value)||1);render()">`;
    body.appendChild(row);
  });});
  document.getElementById('settings-overlay').classList.add('open');
}
function togGD(d){const days=gGym(),i=days.indexOf(d);i>=0?days.splice(i,1):days.push(d);sGym(days);openSettings();render();}
function exportAll(){
  const data={days:load('days'),tgts:load('tgts'),gym:gGym(),tasks:gTasks(),journal:load('journal'),exported:new Date().toISOString()};
  const blob=new Blob([S(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='life-rings-'+dk()+'.json';a.click();
}
function importAll(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=ev=>{
    try{const d=J(ev.target.result);if(d.days)save('days',d.days);if(d.tgts)save('tgts',d.tgts);if(d.gym)sGym(d.gym);if(d.tasks)sTasks(d.tasks);if(d.journal)save('journal',d.journal);render();document.getElementById('settings-overlay').classList.remove('open');}catch{alert('Invalid file');}
  };reader.readAsText(file);
}

// ═════════════════════════════════════════
// NAV
// ═════════════════════════════════════════
function go(v){
  view=v;document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((n,i)=>n.classList.toggle('active',['today','weekly','history'][i]===v));
  render();
}

document.getElementById('taskinput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
render();
