<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dystonia Research Digest{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <div>
                <h1>Dystonia Research Digest</h1>
                <span>PubMed + Semantic Scholar | Automated Daily</span>
            </div>
        </div>
        <nav class="nav-links">
            <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/digests" class="{% if active_page == 'digests' %}active{% endif %}">Digests</a>
            <a href="/papers?q=" class="{% if active_page == 'papers' %}active{% endif %}">Search</a>
            <a href="/categories" class="{% if active_page == 'categories' %}active{% endif %}">Categories</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <span>Marceau Solutions</span> &mdash; Dystonia Research Digest v1.0
        &mdash; Embrace the Pain &amp; Defy the Odds
    </footer>

    <div id="toast" class="toast"></div>

    <script>
        function showToast(msg, duration = 3000) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, duration);
        }

        async function triggerDigest(daysBack = 7) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Running...';
            try {
                const resp = await fetch('/api/run-digest?days_back=' + daysBack, { method: 'POST' });
                const data = await resp.json();
                showToast(data.message || 'Digest started!', 4000);
                setTimeout(() => location.reload(), 5000);
            } catch (e) {
                showToast('Error: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Run Digest Now';
            }
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
