<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marceau Hub</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C9963C;
  --gold-light: #e8c777;
  --gold-dim: rgba(201,150,60,0.15);
  --bg: #1a1a1e;
  --bg-card: #242428;
  --bg-hover: #2e2e34;
  --text: #e8e8ec;
  --text-dim: #9898a4;
  --text-bright: #ffffff;
  --border: #333338;
  --success: #4ade80;
  --danger: #f87171;
  --radius: 10px;
  --radius-lg: 14px;
}
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
a { color: var(--gold); text-decoration: none; }

/* Header */
.header {
  text-align: center;
  padding: 40px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 1px;
}
.header .tagline {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 6px;
}
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 16px;
  font-size: 0.82rem;
}
.stats-bar .stat-val { color: var(--gold); font-weight: 700; font-size: 1.1rem; }
.stats-bar .stat-lbl { color: var(--text-dim); margin-top: 2px; }

/* Container */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 40px;
}

/* Category */
.category-title {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin: 28px 0 12px;
  padding-left: 4px;
}

/* App Grid */
.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

/* App Card */
.app-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
}
.app-card:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(201,150,60,0.1);
}
.app-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.app-icon {
  width: 44px;
  height: 44px;
  background: var(--gold-dim);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}
.app-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-bright);
}
.app-desc {
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 14px;
  flex: 1;
}
.app-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.status-dot {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  font-weight: 600;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.dot.running { background: var(--success); box-shadow: 0 0 6px var(--success); }
.dot.stopped { background: var(--border); }
.dot.production { background: var(--gold); box-shadow: 0 0 6px var(--gold); }

/* Production badge */
.badge-prod {
  display: inline-block;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--gold);
  border: 1px solid rgba(201,150,60,0.4);
  border-radius: 4px;
  padding: 1px 6px;
  margin-left: 6px;
  vertical-align: middle;
}
.category-title.production { color: var(--gold); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn-launch {
  background: var(--gold);
  color: #1a1a1e;
  border-color: var(--gold);
}
.btn-launch:hover { background: var(--gold-light); color: #1a1a1e; }
.btn-open {
  background: rgba(74,222,128,0.15);
  color: var(--success);
  border-color: var(--success);
}
.btn-open:hover { background: rgba(74,222,128,0.25); color: var(--success); }
.btn-stop {
  border-color: var(--danger);
  color: var(--danger);
  font-size: 0.72rem;
  padding: 5px 10px;
}
.btn-stop:hover { background: rgba(248,113,113,0.15); }

.btn-group { display: flex; gap: 6px; }

/* Spinner */
.btn .spinner {
  width: 12px; height: 12px;
  border: 2px solid transparent;
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.5s linear infinite;
  display: none;
}
.btn.loading .spinner { display: inline-block; }
.btn.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Port label */
.port-label {
  font-size: 0.68rem;
  color: var(--text-dim);
  font-family: 'SF Mono', monospace;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 0.72rem;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
}

/* Responsive */
@media (max-width: 700px) {
  .app-grid { grid-template-columns: 1fr; }
  .stats-bar { gap: 20px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>MARCEAU HUB</h1>
  <div class="tagline">One URL. All your tools.</div>
  <div class="stats-bar" id="statsBar">
    <div><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Total Apps</div></div>
    <div><div class="stat-val" id="statRunning" style="color:var(--success)">—</div><div class="stat-lbl">Running</div></div>
    <div><div class="stat-val" id="statStopped">—</div><div class="stat-lbl">Stopped</div></div>
  </div>
</div>

<div class="container" id="appContainer">
  <div style="text-align:center;padding:40px;color:var(--text-dim);">Loading apps...</div>
</div>

<div class="footer">
  Marceau Solutions &mdash; Bookmark this page: <strong style="color:var(--gold);">http://127.0.0.1:8760</strong>
</div>

<script>
const CATEGORY_ORDER = ['production', 'business', 'productivity', 'health', 'build', 'system'];
const CATEGORY_NAMES = {
  production: '🌐 Production — Live on EC2',
  business: '💼 Local Sales Tools',
  productivity: '⚙️ Operations',
  health: '🩺 Health',
  build: '🔬 Labs & Build',
  system: '🔧 System',
};

let apps = [];

async function loadApps() {
  try {
    apps = await (await fetch('/api/apps')).json();
    render();
  } catch(e) {
    document.getElementById('appContainer').innerHTML =
      '<div style="text-align:center;padding:40px;color:var(--danger);">Failed to load apps</div>';
  }
}

function render() {
  const total = apps.filter(a => a.id !== 'hub').length;
  const running = apps.filter(a => a.running && a.id !== 'hub').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statRunning').textContent = running;
  document.getElementById('statStopped').textContent = total - running;

  // Group by category
  const grouped = {};
  for (const a of apps) {
    if (a.id === 'hub') continue;
    const cat = a.category || 'system';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(a);
  }

  let html = '';
  for (const cat of CATEGORY_ORDER) {
    if (!grouped[cat] || !grouped[cat].length) continue;
    const isProd = cat === 'production';
    html += `<div class="category-title${isProd ? ' production' : ''}">${CATEGORY_NAMES[cat] || cat}</div>`;
    html += '<div class="app-grid">';
    for (const a of grouped[cat]) {
      const portLabel = a.external ? a.url.replace('https://', '') : (a.port ? `:${a.port}` : '');
      const statusDot = a.external ? 'production' : (a.running ? 'running' : 'stopped');
      const statusText = a.external ? 'EC2 Live' : (a.running ? 'Running' : 'Stopped');
      const statusColor = a.external ? 'var(--gold)' : (a.running ? 'var(--success)' : 'var(--text-dim)');
      const buttons = a.external ? `
        <button class="btn btn-launch" onclick="window.open('${a.url}','_blank')">Open ↗</button>
      ` : (a.running ? `
        <button class="btn btn-open" onclick="openApp('${a.id}')">
          <span class="btn-text">Open</span>
        </button>
        <button class="btn btn-stop" onclick="stopApp('${a.id}')">Stop</button>
      ` : `
        <button class="btn btn-launch" id="btn-${a.id}" onclick="launchApp('${a.id}')">
          <span class="spinner"></span>
          <span class="btn-text">Launch</span>
        </button>
      `);

      html += `
        <div class="app-card" id="card-${a.id}">
          <div class="app-top">
            <div class="app-icon">${a.icon}</div>
            <div>
              <div class="app-name">${a.name}${a.external ? '<span class="badge-prod">PROD</span>' : ''}</div>
              <span class="port-label">${portLabel}</span>
            </div>
          </div>
          <div class="app-desc">${a.description}</div>
          <div class="app-footer">
            <div class="status-dot">
              <span class="dot ${statusDot}"></span>
              <span style="color:${statusColor}">${statusText}</span>
            </div>
            <div class="btn-group">${buttons}</div>
          </div>
        </div>`;
    }
    html += '</div>';
  }

  document.getElementById('appContainer').innerHTML = html;
}

function openApp(id) {
  const a = apps.find(x => x.id === id);
  if (a) window.open(a.url, '_blank');
}

async function launchApp(id) {
  const btn = document.getElementById(`btn-${id}`);
  if (btn) btn.classList.add('loading');

  try {
    const resp = await fetch(`/api/launch/${id}`, { method: 'POST' });
    const data = await resp.json();

    if (data.already_running || data.success) {
      // Wait for it to actually start listening
      let attempts = 0;
      const check = setInterval(async () => {
        attempts++;
        const fresh = await (await fetch('/api/apps')).json();
        const target = fresh.find(a => a.id === id);
        if (target && target.running) {
          clearInterval(check);
          apps = fresh;
          render();
          window.open(target.url, '_blank');
        } else if (attempts > 15) {
          clearInterval(check);
          apps = fresh;
          render();
          alert('App started but may still be loading. Try opening manually.');
        }
      }, 1000);
    } else {
      alert('Launch failed: ' + (data.error || 'Unknown error'));
      if (btn) btn.classList.remove('loading');
    }
  } catch(e) {
    alert('Error: ' + e.message);
    if (btn) btn.classList.remove('loading');
  }
}

async function stopApp(id) {
  if (!confirm(`Stop ${id}?`)) return;
  try {
    await fetch(`/api/stop/${id}`, { method: 'POST' });
    setTimeout(loadApps, 500);
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// Auto-refresh status every 10 seconds
loadApps();
setInterval(loadApps, 10000);
</script>
</body>
</html>
