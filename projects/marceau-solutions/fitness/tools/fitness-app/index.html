<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MFitness">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Marceau Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #141414;
  --bg3: #1a1a1a;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --dim: #999;
  --muted: #666;
  --gold: #C9963C;
  --gold-dim: rgba(201,150,60,0.15);
  --gold-glow: rgba(201,150,60,0.3);
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; line-height:1.5; overflow-x:hidden; padding-top:var(--safe-top); padding-bottom:calc(70px + var(--safe-bottom)); -webkit-font-smoothing:antialiased; }

/* Top Bar */
.top-bar { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(10,10,10,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:var(--safe-top) 1rem 0; height:calc(56px + var(--safe-top)); display:flex; align-items:center; justify-content:space-between; }
.top-bar h1 { font-size:1.1rem; font-weight:700; }
.top-bar h1 span { color:var(--gold); }
.top-bar .back-btn { display:none; background:none; border:none; color:var(--gold); font-size:0.95rem; cursor:pointer; padding:8px 0; }
.top-bar .back-btn.visible { display:flex; align-items:center; gap:4px; }

/* Bottom Nav */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:100; background:rgba(10,10,10,0.95); backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; padding-bottom:var(--safe-bottom); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 0 6px; cursor:pointer; color:var(--muted); transition:color 0.2s; border:none; background:none; font-family:inherit; font-size:0.65rem; font-weight:500; }
.nav-item.active { color:var(--gold); }
.nav-item svg { width:22px; height:22px; margin-bottom:3px; }

/* Pages */
.page { display:none; padding:calc(56px + var(--safe-top) + 16px) 16px 16px; min-height:100vh; }
.page.active { display:block; }

/* Cards */
.card { background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; cursor:pointer; transition:border-color 0.2s; }
.card:active { border-color:var(--gold); }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.card-title { font-weight:700; font-size:1rem; }
.card-badge { background:var(--gold-dim); color:var(--gold); font-size:0.7rem; font-weight:600; padding:3px 8px; border-radius:20px; }
.card-subtitle { color:var(--dim); font-size:0.8rem; }

/* Section Headers */
.section-title { font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:24px 0 12px; }

/* Exercise List */
.exercise-item { display:flex; align-items:center; gap:12px; padding:14px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; cursor:pointer; }
.exercise-item:active { border-color:var(--gold); }
.exercise-icon { width:44px; height:44px; border-radius:10px; background:var(--gold-dim); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
.exercise-info { flex:1; min-width:0; }
.exercise-name { font-weight:600; font-size:0.95rem; }
.exercise-meta { color:var(--dim); font-size:0.75rem; margin-top:2px; }

/* Workout Detail */
.workout-exercise { background:var(--bg3); border:1px solid var(--border); border-radius:12px; margin-bottom:10px; overflow:hidden; }
.workout-exercise-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; }
.workout-exercise-header h3 { font-size:0.95rem; font-weight:600; }
.exercise-sets-badge { font-size:0.75rem; color:var(--dim); }
.workout-exercise-body { display:none; padding:0 16px 14px; }
.workout-exercise-body.open { display:block; }
.set-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.set-label { font-size:0.8rem; color:var(--dim); width:50px; flex-shrink:0; }
.set-input { background:var(--bg2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:0.9rem; padding:10px 12px; width:100%; text-align:center; -webkit-appearance:none; }
.set-input:focus { border-color:var(--gold); outline:none; }
.set-done { width:36px; height:36px; border-radius:8px; border:2px solid var(--border); background:none; color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:1.1rem; }
.set-done.checked { background:var(--gold); border-color:var(--gold); color:#000; }

/* Form Cues */
.form-cues { margin-top:12px; padding:12px; background:var(--bg2); border-radius:10px; }
.form-cues h4 { font-size:0.75rem; color:var(--gold); font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
.form-cue { font-size:0.8rem; color:var(--dim); padding:3px 0; padding-left:14px; position:relative; }
.form-cue::before { content:""; position:absolute; left:0; top:10px; width:6px; height:6px; border-radius:50%; background:var(--gold-dim); }

/* Timer */
.timer-container { text-align:center; padding:20px; }
.timer-display { font-size:4rem; font-weight:900; font-variant-numeric:tabular-nums; color:var(--gold); margin:20px 0; }
.timer-controls { display:flex; gap:12px; justify-content:center; margin-top:16px; }
.timer-btn { padding:12px 28px; border-radius:12px; border:none; font-family:inherit; font-weight:600; font-size:0.95rem; cursor:pointer; }
.timer-btn.primary { background:var(--gold); color:#000; }
.timer-btn.secondary { background:var(--bg3); color:var(--text); border:1px solid var(--border); }
.timer-presets { display:flex; gap:8px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
.timer-preset { padding:8px 16px; border-radius:20px; background:var(--bg3); border:1px solid var(--border); color:var(--dim); font-size:0.8rem; cursor:pointer; font-family:inherit; }
.timer-preset.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }

/* Exercise Detail Page */
.exercise-detail-header { text-align:center; padding:20px 0; }
.exercise-detail-icon { width:80px; height:80px; border-radius:20px; background:var(--gold-dim); display:flex; align-items:center; justify-content:center; font-size:2.5rem; margin:0 auto 16px; }
.exercise-detail-name { font-size:1.5rem; font-weight:900; }
.exercise-detail-category { color:var(--gold); font-size:0.85rem; font-weight:600; margin-top:4px; }
.detail-section { margin-top:20px; }
.detail-section h3 { font-size:0.85rem; font-weight:600; color:var(--gold); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px; }
.detail-section p { color:var(--dim); font-size:0.9rem; line-height:1.6; }
.muscle-tags { display:flex; flex-wrap:wrap; gap:6px; }
.muscle-tag { padding:5px 12px; border-radius:20px; background:var(--gold-dim); color:var(--gold); font-size:0.75rem; font-weight:500; }
.equipment-tag { padding:5px 12px; border-radius:20px; background:var(--bg2); border:1px solid var(--border); color:var(--dim); font-size:0.75rem; font-weight:500; }
.difficulty-bar { display:flex; gap:4px; align-items:center; margin-top:4px; }
.difficulty-dot { width:10px; height:10px; border-radius:50%; background:var(--border); }
.difficulty-dot.filled { background:var(--gold); }

/* Stats */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.stat-card { background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:16px; text-align:center; }
.stat-value { font-size:1.8rem; font-weight:900; color:var(--gold); }
.stat-label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }

/* Programs */
.program-day { margin-bottom:16px; }
.program-day-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.program-day-num { width:32px; height:32px; border-radius:8px; background:var(--gold); color:#000; font-weight:700; font-size:0.85rem; display:flex; align-items:center; justify-content:center; }
.program-day-title { font-weight:600; }
.program-exercise-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--bg2); border-radius:8px; margin-bottom:4px; margin-left:42px; }
.program-exercise-name { font-size:0.85rem; }
.program-exercise-detail { font-size:0.8rem; color:var(--dim); }

/* History */
.history-item { padding:14px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; }
.history-date { font-size:0.75rem; color:var(--gold); font-weight:600; }
.history-workout { font-weight:600; margin-top:4px; }
.history-stats { color:var(--dim); font-size:0.8rem; margin-top:4px; }

/* Empty state */
.empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
.empty-state svg { width:48px; height:48px; margin-bottom:12px; opacity:0.3; }
.empty-state p { font-size:0.9rem; }

/* Muscle group filter pills */
.filter-pills { display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:16px; -webkit-overflow-scrolling:touch; }
.filter-pills::-webkit-scrollbar { display:none; }
.filter-pill { padding:6px 14px; border-radius:20px; background:var(--bg3); border:1px solid var(--border); color:var(--dim); font-size:0.75rem; font-weight:500; cursor:pointer; white-space:nowrap; font-family:inherit; }
.filter-pill.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }

/* Start Workout Button */
.start-workout-btn { display:block; width:100%; padding:16px; border-radius:14px; background:var(--gold); color:#000; font-family:inherit; font-weight:700; font-size:1rem; border:none; cursor:pointer; margin-top:16px; }
.start-workout-btn:active { opacity:0.8; }

/* Workout Active Bar */
.active-workout-bar { position:fixed; bottom:calc(56px + var(--safe-bottom)); left:0; right:0; background:var(--gold); color:#000; padding:12px 16px; display:none; align-items:center; justify-content:space-between; z-index:99; font-weight:600; font-size:0.9rem; }
.active-workout-bar.visible { display:flex; }
.active-workout-bar button { background:rgba(0,0,0,0.2); border:none; color:#000; padding:6px 14px; border-radius:8px; font-weight:600; font-family:inherit; cursor:pointer; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <button class="back-btn" id="backBtn" onclick="goBack()">&#8592; Back</button>
  <h1><span>MARCEAU</span> FITNESS</h1>
  <div style="width:50px"></div>
</div>

<!-- Active Workout Bar -->
<div class="active-workout-bar" id="activeBar">
  <span id="activeBarText">Push Day A</span>
  <button onclick="navigateTo('active-workout')">Continue</button>
</div>

<!-- Page: Home -->
<div class="page active" id="page-home">
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-workouts">0</div>
      <div class="stat-label">Workouts</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-streak">0</div>
      <div class="stat-label">Day Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-volume">0</div>
      <div class="stat-label">Total Volume (lbs)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-exercises">20</div>
      <div class="stat-label">Exercises</div>
    </div>
  </div>

  <div class="section-title">Today's Workout</div>
  <div class="card" onclick="navigateTo('program-detail', getTodayWorkout())">
    <div class="card-header">
      <span class="card-title" id="today-workout-name">Push Day A</span>
      <span class="card-badge" id="today-workout-badge">Chest + Shoulders</span>
    </div>
    <div class="card-subtitle" id="today-workout-subtitle">5 exercises &bull; ~55 min</div>
  </div>

  <div class="section-title">Recent History</div>
  <div id="history-list">
    <div class="empty-state"><p>Complete your first workout to see history here.</p></div>
  </div>
</div>

<!-- Page: Programs -->
<div class="page" id="page-programs">
  <div class="section-title">Training Programs</div>
  <div id="programs-list"></div>
</div>

<!-- Page: Program Detail -->
<div class="page" id="page-program-detail">
  <div id="program-detail-content"></div>
</div>

<!-- Page: Active Workout -->
<div class="page" id="page-active-workout">
  <div id="active-workout-content"></div>
</div>

<!-- Page: Exercises -->
<div class="page" id="page-exercises">
  <div class="section-title">Exercise Library</div>
  <div class="filter-pills" id="filter-pills"></div>
  <div id="exercises-list"></div>
</div>

<!-- Page: Exercise Detail -->
<div class="page" id="page-exercise-detail">
  <div id="exercise-detail-content"></div>
</div>

<!-- Page: Timer -->
<div class="page" id="page-timer">
  <div class="section-title">Rest Timer</div>
  <div class="timer-container">
    <div class="timer-display" id="timer-display">1:30</div>
    <div class="timer-controls">
      <button class="timer-btn primary" id="timer-start" onclick="toggleTimer()">Start</button>
      <button class="timer-btn secondary" onclick="resetTimer()">Reset</button>
    </div>
    <div class="timer-presets">
      <button class="timer-preset" onclick="setTimer(30)">0:30</button>
      <button class="timer-preset" onclick="setTimer(60)">1:00</button>
      <button class="timer-preset active" onclick="setTimer(90)">1:30</button>
      <button class="timer-preset" onclick="setTimer(120)">2:00</button>
      <button class="timer-preset" onclick="setTimer(180)">3:00</button>
      <button class="timer-preset" onclick="setTimer(300)">5:00</button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
    Home
  </button>
  <button class="nav-item" onclick="switchTab('programs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Programs
  </button>
  <button class="nav-item" onclick="switchTab('exercises')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5l11 11M6.5 17.5l11-11"/><circle cx="12" cy="12" r="9"/></svg>
    Exercises
  </button>
  <button class="nav-item" onclick="switchTab('timer')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M9 2h6"/></svg>
    Timer
  </button>
</nav>

const CATEGORIES = {all:"All", legs:"Legs", back:"Back", chest:"Chest", shoulders:"Shoulders", arms:"Arms", core:"Core", glutes:"Glutes", full_body:"Full Body"};

// ============================================================================
// STATE
// ============================================================================
let currentPage = 'home';
let pageStack = ['home'];
let activeFilter = 'all';
let timerSeconds = 90;
let timerRemaining = 90;
let timerInterval = null;
let timerRunning = false;
let activeWorkout = null; // {programId, dayIndex, exercises:[{id, sets:[{weight,reps,done}]}], startTime}
let selectedProgram = null;

// LocalStorage
function loadData(key, def) { try { return JSON.parse(localStorage.getItem('mf_'+key)) || def; } catch { return def; } }
function saveData(key, val) { localStorage.setItem('mf_'+key, JSON.stringify(val)); }

let history = loadData('history', []);
let stats = loadData('stats', { workouts:0, streak:0, totalVolume:0 });
let selectedProgramId = loadData('selectedProgram', 'ppl');

// ============================================================================
// NAVIGATION
// ============================================================================
function switchTab(tab) {
  pageStack = [tab];
  showPage(tab);
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    const tabs = ['home','programs','exercises','timer'];
    el.classList.toggle('active', tabs[i] === tab);
  });
  document.getElementById('backBtn').classList.remove('visible');
}

function navigateTo(page, data) {
  pageStack.push(page);
  if (page === 'exercise-detail') renderExerciseDetail(data);
  else if (page === 'program-detail') renderProgramDetail(data);
  else if (page === 'active-workout') renderActiveWorkout();
  showPage(page);
  document.getElementById('backBtn').classList.add('visible');
}

function goBack() {
  if (pageStack.length > 1) {
    pageStack.pop();
    const prev = pageStack[pageStack.length - 1];
    showPage(prev);
    if (pageStack.length <= 1) document.getElementById('backBtn').classList.remove('visible');
  }
}

function showPage(id) {
  currentPage = id;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + id);
  if (page) page.classList.add('active');
  window.scrollTo(0, 0);
}

// ============================================================================
// RENDER: HOME
// ============================================================================
function renderHome() {
  document.getElementById('stat-workouts').textContent = stats.workouts;
  document.getElementById('stat-streak').textContent = stats.streak;
  document.getElementById('stat-volume').textContent = stats.totalVolume > 1000 ? (stats.totalVolume / 1000).toFixed(1) + 'K' : stats.totalVolume;

  const today = getTodayWorkout();
  if (today) {
    document.getElementById('today-workout-name').textContent = today.name;
    document.getElementById('today-workout-badge').textContent = today.focus;
    document.getElementById('today-workout-subtitle').textContent = today.exercises.length + ' exercises';
  }

  const histEl = document.getElementById('history-list');
  if (history.length === 0) {
    histEl.innerHTML = '<div class="empty-state"><p>Complete your first workout to see history here.</p></div>';
  } else {
    histEl.innerHTML = history.slice(0, 5).map(h => `
      <div class="history-item">
        <div class="history-date">${h.date}</div>
        <div class="history-workout">${h.name}</div>
        <div class="history-stats">${h.exercises} exercises &bull; ${h.volume} lbs volume &bull; ${h.duration}</div>
      </div>
    `).join('');
  }
}

function getTodayWorkout() {
  const prog = PROGRAMS.find(p => p.id === selectedProgramId);
  if (!prog) return prog || PROGRAMS[0].days[0];
  const dayOfWeek = new Date().getDay();
  const dayIndex = dayOfWeek % prog.days.length;
  return { ...prog.days[dayIndex], programId: prog.id, dayIndex };
}

// ============================================================================
// RENDER: PROGRAMS
// ============================================================================
function renderPrograms() {
  const el = document.getElementById('programs-list');
  el.innerHTML = PROGRAMS.map(p => `
    <div class="card" onclick="navigateTo('program-detail', {programId:'${p.id}', dayIndex:0})">
      <div class="card-header">
        <span class="card-title">${p.name}</span>
        <span class="card-badge">${p.level}</span>
      </div>
      <div class="card-subtitle">${p.description} &bull; ${p.frequency}</div>
      <div style="margin-top:8px; font-size:0.8rem; color:var(--dim)">${p.days.length} training days: ${p.days.map(d => d.name).join(', ')}</div>
    </div>
  `).join('');
}

// ============================================================================
// RENDER: PROGRAM DETAIL
// ============================================================================

    <div style="margin-bottom:20px">
      <h2 style="font-size:1.3rem; font-weight:900">${prog.name}</h2>
      <p style="color:var(--dim); font-size:0.85rem; margin-top:4px">${prog.description} &bull; ${prog.frequency}</p>
    </div>

          </div>

          return `<div class="program-exercise-row" onclick="navigateTo('exercise-detail', '${ex.id}')">

// ============================================================================
// ACTIVE WORKOUT
// ============================================================================
function startWorkout(programId, dayIndex) {
  const prog = PROGRAMS.find(p => p.id === programId);
  const day = prog.days[dayIndex];
  activeWorkout = {
    programId, dayIndex, name: day.name, focus: day.focus, startTime: Date.now(),
    exercises: day.exercises.map(ex => ({
      id: ex.id,
      targetSets: ex.sets,
      targetReps: ex.reps,
      rest: ex.rest,
      sets: Array.from({length: ex.sets}, () => ({weight:'', reps:'', done:false}))
    }))
  };
  document.getElementById('activeBar').classList.add('visible');
  document.getElementById('activeBarText').textContent = day.name;
  navigateTo('active-workout');
}

function renderActiveWorkout() {
  if (!activeWorkout) return;
  const el = document.getElementById('active-workout-content');
  const elapsed = Math.floor((Date.now() - activeWorkout.startTime) / 60000);
  el.innerHTML = `
    <div style="margin-bottom:16px">
      <h2 style="font-size:1.3rem; font-weight:900">${activeWorkout.name}</h2>
      <p style="color:var(--dim); font-size:0.85rem">${activeWorkout.focus} &bull; ${elapsed} min elapsed</p>
    </div>
    ${activeWorkout.exercises.map((ex, ei) => {
      const e = EXERCISES[ex.id];
      const completedSets = ex.sets.filter(s => s.done).length;
      return `
        <div class="workout-exercise">
          <div class="workout-exercise-header" onclick="toggleExercise(${ei})">
            <h3>${e ? e.icon + ' ' + e.name : ex.id}</h3>
            <span class="exercise-sets-badge">${completedSets}/${ex.targetSets} sets</span>
          </div>
          <div class="workout-exercise-body${ei === 0 ? ' open' : ''}" id="exercise-body-${ei}">
            <div style="font-size:0.75rem; color:var(--dim); margin-bottom:10px">Target: ${ex.targetSets} x ${ex.targetReps} &bull; Rest: ${ex.rest}s</div>
            ${ex.sets.map((set, si) => `
              <div class="set-row">
                <span class="set-label">Set ${si+1}</span>
                <input class="set-input" type="number" placeholder="lbs" value="${set.weight}" onchange="updateSet(${ei},${si},'weight',this.value)" inputmode="numeric">
                <input class="set-input" type="number" placeholder="reps" value="${set.reps}" onchange="updateSet(${ei},${si},'reps',this.value)" inputmode="numeric">
                <button class="set-done ${set.done?'checked':''}" onclick="toggleSet(${ei},${si})">✓</button>
              </div>
            `).join('')}
            ${e ? `<div class="form-cues"><h4>Form Cues</h4>${e.cues.map(c => `<div class="form-cue">${c}</div>`).join('')}</div>` : ''}
          </div>
        </div>
      `;
    }).join('')}
    <button class="start-workout-btn" onclick="finishWorkout()" style="background:var(--green); margin-top:20px">Finish Workout</button>
  `;
}

function toggleExercise(idx) {
  const el = document.getElementById('exercise-body-' + idx);
  if (el) el.classList.toggle('open');
}

function updateSet(ei, si, field, value) {
  if (activeWorkout) {
    activeWorkout.exercises[ei].sets[si][field] = value;
  }
}

function toggleSet(ei, si) {
  if (!activeWorkout) return;
  const set = activeWorkout.exercises[ei].sets[si];
  set.done = !set.done;
  renderActiveWorkout();
  if (set.done) { setTimer(activeWorkout.exercises[ei].rest); startTimerAuto(); }
}

function finishWorkout() {
  if (!activeWorkout) return;
  const duration = Math.floor((Date.now() - activeWorkout.startTime) / 60000);
  let volume = 0;
  let exerciseCount = 0;
  activeWorkout.exercises.forEach(ex => {
    let hadSet = false;
    ex.sets.forEach(s => {
      if (s.done && s.weight && s.reps) {
        volume += parseFloat(s.weight) * parseInt(s.reps);
        hadSet = true;
      }
    });
    if (hadSet) exerciseCount++;
  });

  history.unshift({
    date: new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}),
    name: activeWorkout.name,
    exercises: exerciseCount,
    volume: Math.round(volume),
    duration: duration + ' min'
  });
  saveData('history', history);

  stats.workouts++;
  stats.totalVolume += Math.round(volume);
  // Simple streak logic
  const lastDate = loadData('lastWorkoutDate', '');
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (lastDate === yesterday || lastDate === '') stats.streak++;
  else if (lastDate !== today) stats.streak = 1;
  saveData('lastWorkoutDate', today);
  saveData('stats', stats);

  activeWorkout = null;
  document.getElementById('activeBar').classList.remove('visible');
  switchTab('home');
  renderHome();
}

// ============================================================================
// TIMER
// ============================================================================
function setTimer(secs) {
  timerSeconds = secs;
  timerRemaining = secs;
  timerRunning = false;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  updateTimerDisplay();
  document.querySelectorAll('.timer-preset').forEach(el => {
    el.classList.toggle('active', parseInt(el.textContent.split(':')[0])*60 + parseInt(el.textContent.split(':')[1]) === secs);
  });
  document.getElementById('timer-start').textContent = 'Start';
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timer-start').textContent = 'Resume';
  } else {
    timerRunning = true;
    document.getElementById('timer-start').textContent = 'Pause';
    timerInterval = setInterval(() => {
      timerRemaining--;
      updateTimerDisplay();
      if (timerRemaining <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timer-start').textContent = 'Start';
        if ('vibrate' in navigator) navigator.vibrate([200,100,200]);
        timerRemaining = timerSeconds;
        updateTimerDisplay();
      }
    }, 1000);
  }
}

function startTimerAuto() {
  if (!timerRunning) {
    timerRemaining = timerSeconds;
    updateTimerDisplay();
    toggleTimer();
  }
}

function resetTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerRunning = false;
  timerRemaining = timerSeconds;
  updateTimerDisplay();
  document.getElementById('timer-start').textContent = 'Start';
}

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  document.getElementById('timer-display').textContent = m + ':' + s.toString().padStart(2, '0');
}

// ============================================================================
// INIT

renderHome();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
