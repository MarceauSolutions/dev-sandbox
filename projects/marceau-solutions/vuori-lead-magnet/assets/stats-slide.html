<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 60px;
        }

        .title {
            font-size: 24px;
            font-weight: 400;
            color: #a0a0a0;
            margin-bottom: 60px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 80px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .stat-label {
            font-size: 18px;
            color: #e0e0e0;
            font-weight: 400;
            max-width: 200px;
        }

        .footer {
            margin-top: 80px;
            font-size: 16px;
            color: #666;
        }

        .footer span {
            color: #6366f1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">What We've Seen With Fitness Brands</div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value">70%</div>
                <div class="stat-label">Less time on admin tasks</div>
            </div>

            <div class="stat">
                <div class="stat-value">3x</div>
                <div class="stat-label">Higher response rates</div>
            </div>

            <div class="stat">
                <div class="stat-value">100%</div>
                <div class="stat-label">Personalization quality maintained</div>
            </div>
        </div>

        <div class="footer">
            Same results. <span>Just automated.</span>
        </div>
    </div>
</body>
</html>
