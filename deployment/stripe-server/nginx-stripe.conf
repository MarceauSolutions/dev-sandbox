# Nginx configuration for Stripe API Server
# Location: /etc/nginx/conf.d/stripe.conf
#
# For SSL with Let's Encrypt:
# 1. sudo certbot --nginx -d api.yourdomain.com
# 2. Certbot will auto-modify this file to add SSL

upstream stripe_server {
    server 127.0.0.1:5002;
    keepalive 32;
}

server {
    listen 80;
    server_name api.yourdomain.com;  # Change to your domain

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=stripe_limit:10m rate=10r/s;

    # Webhook endpoint - allow Stripe IPs
    location /webhooks/stripe {
        limit_req zone=stripe_limit burst=20 nodelay;

        proxy_pass http://stripe_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important for Stripe webhooks - preserve raw body
        proxy_set_header Content-Type $content_type;
        proxy_buffering off;
    }

    # API endpoints - require authentication (handled by app)
    location /api/ {
        limit_req zone=stripe_limit burst=10 nodelay;

        proxy_pass http://stripe_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check - no rate limiting
    location /health {
        proxy_pass http://stripe_server;
        proxy_http_version 1.1;
    }

    # Root endpoint
    location / {
        proxy_pass http://stripe_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/stripe_access.log;
    error_log /var/log/nginx/stripe_error.log;
}
